<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM CHARTS ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg: #07090e;
  --surface: #0c0f18;
  --surface2: #131825;
  --border: #1e2535;
  --text: #dde4f0;
  --muted: #5a6580;
  --up: #00d68f;
  --down: #ff3d6b;
  --r1: #ff006e; --r2: #ff6500; --r3: #f5d800;
  --r4: #00e676; --r5: #00b0ff; --r6: #aa00ff;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Rainbow animations ── */
@keyframes rb-shift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}
@keyframes rb-glow {
  0%,100% { box-shadow: 0 0 8px #ff006e55, 0 0 20px #9b00ff22; }
  33%     { box-shadow: 0 0 8px #00e67655, 0 0 20px #00b0ff22; }
  66%     { box-shadow: 0 0 8px #f5d80055, 0 0 20px #ff650022; }
}

.rb-grad {
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1));
  background-size: 300% 100%;
  animation: rb-shift 5s linear infinite;
}
.rb-text {
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── HEADER ── */
header {
  height: 54px;
  background: var(--surface);
  border-bottom: 2px solid transparent;
  background:
    linear-gradient(var(--surface), var(--surface)) padding-box,
    linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1)) border-box;
  background-size: auto, 300% 100%;
  animation: rb-shift 5s linear infinite;
  animation-name: none, rb-shift;
  background-clip: padding-box, border-box;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
}
/* Simpler approach for animated border */
header::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1));
  background-size: 300% 100%;
  animation: rb-shift 4s linear infinite;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 17px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  flex-shrink: 0;
}

.sep { width:1px; height:28px; background:var(--border); flex-shrink:0; }

/* Symbol input */
.sym-row { display:flex; align-items:center; gap:7px; flex:1; min-width:0; overflow:hidden; }

#sym-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 5px;
  width: 110px;
  text-transform: uppercase;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  flex-shrink: 0;
}
#sym-input:focus {
  border-color: var(--r5);
  box-shadow: 0 0 0 2px rgba(0,176,255,.18);
}

.quick-btns { display:flex; gap:4px; flex-wrap:nowrap; overflow:hidden; }

.btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 5px 9px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn:hover { border-color: var(--r5); color: var(--r5); }
.btn.active {
  background: rgba(0,176,255,.12);
  border-color: var(--r5);
  color: var(--r5);
}

.btn-load {
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6));
  background-size: 300% 100%;
  animation: rb-shift 3s linear infinite;
  border: none;
  color: #000;
  font-weight: 700;
  padding: 5px 13px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  flex-shrink: 0;
  transition: opacity .15s;
}
.btn-load:hover { opacity: .82; }

/* Price display */
.price-display {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#cur-price {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--up);
}
#cur-sym { font-size:11px; color:var(--muted); letter-spacing:1px; }
#cur-chg { font-size:11px; }
.chg-up { color: var(--up); }
.chg-down { color: var(--down); }

/* ── TOOLBAR ── */
.toolbar {
  height: 36px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 5px;
  flex-shrink: 0;
  overflow-x: auto;
}
.toolbar::-webkit-scrollbar { height:0; }

.tf-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

/* ── MAIN LAYOUT ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── DRAWING PANEL ── */
.draw-panel {
  width: 46px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 5px;
  gap: 4px;
  flex-shrink: 0;
}

.tool-btn {
  width: 36px;
  height: 36px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all .15s;
  color: var(--muted);
  user-select: none;
  position: relative;
}
.tool-btn:hover {
  border-color: var(--r5);
  color: var(--r5);
  box-shadow: 0 0 8px rgba(0,176,255,.25);
}
.tool-btn.active {
  background: rgba(0,176,255,.12);
  border-color: var(--r5);
  color: var(--r5);
  animation: rb-glow 3s ease infinite;
}
.tool-divider {
  width: 26px;
  height: 1px;
  background: var(--border);
  margin: 2px 0;
  flex-shrink: 0;
}
.tool-label {
  font-size: 7px;
  color: var(--muted);
  letter-spacing: .5px;
  text-align: center;
  margin-top: -2px;
  font-family: 'Space Mono', monospace;
}

/* ── CHART AREA ── */
.chart-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.ohlc-bar {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(12,15,24,.92);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 12px;
  font-size: 10px;
  display: flex;
  gap: 10px;
  pointer-events: none;
  z-index: 20;
  white-space: nowrap;
}
.ohlc-item { display:flex; align-items:center; gap:4px; }
.ohlc-item .lbl { color:var(--muted); font-size:9px; }

.chart-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#main-chart { width:100%; height:100%; }

#draw-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}
#draw-canvas.draw-mode {
  pointer-events: all;
  cursor: crosshair;
}

.chart-legend {
  position: absolute;
  top: 36px;
  left: 8px;
  z-index: 10;
  pointer-events: none;
}
.legend-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 2px;
  padding: 2px 6px;
  background: rgba(12,15,24,.85);
  border-radius: 3px;
}
.legend-line { width:14px; height:2px; border-radius:1px; }
.legend-txt { font-size:9px; }

/* Sub chart */
.sub-wrap {
  height: 0;
  border-top: 0;
  overflow: hidden;
  transition: height .25s ease, border .25s ease;
  flex-shrink: 0;
}
.sub-wrap.open {
  height: 145px;
  border-top: 1px solid var(--border);
}
#sub-chart { width:100%; height:100%; }

/* ── INDICATORS PANEL ── */
.ind-panel {
  width: 218px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.panel-head {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
}
.panel-head::after {
  content: '';
  position: absolute;
  bottom: -1px; left:0; right:0;
  height: 1px;
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1));
  background-size: 300% 100%;
  animation: rb-shift 5s linear infinite;
}

.ind-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}
.ind-scroll::-webkit-scrollbar { width:3px; }
.ind-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.grp-label {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 4px 6px 6px;
}

.ind-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
  margin-bottom: 2px;
}
.ind-item:hover { background: var(--surface2); }
.ind-item.on { background: rgba(0,0,0,.25); }

/* Toggle switch */
.toggle {
  width: 30px;
  height: 16px;
  background: var(--border);
  border-radius: 8px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--muted);
  top: 2px; left: 2px;
  transition: transform .2s, background .2s;
}
.ind-item.on .toggle { background: rgba(0,214,143,.25); }
.ind-item.on .toggle::after { transform: translateX(14px); background: var(--up); }

.ind-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ind-name { font-size:11px; flex:1; }
.ind-param { font-size:9px; color:var(--muted); }

/* Bottom rainbow bar */
.rainbow-footer {
  height: 3px;
  background: linear-gradient(90deg, var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1));
  background-size: 300% 100%;
  animation: rb-shift 4s linear infinite;
  flex-shrink: 0;
}

/* Scrollbar on toolbar */
.toolbar::-webkit-scrollbar { height: 2px; }
.toolbar::-webkit-scrollbar-thumb { background: var(--border); }

</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo">⬡ PRISM</div>
  <div class="sep"></div>

  <div class="sym-row">
    <input id="sym-input" type="text" value="AAPL" placeholder="Symbol…" autocomplete="off" spellcheck="false" />
    <button class="btn-load" onclick="loadSymbol()">LOAD</button>

      <button class="btn" onclick="qs('SPY')">SPY</button>
      <button class="btn" onclick="qs('MSFT')">MSFT</button>
      <button class="btn" onclick="qs('AMZN')">AMZN</button>
    </div>
  </div>

  <div class="price-display">
    <span id="cur-sym" style="font-family:'Orbitron',sans-serif;font-size:11px;"></span>
    <span id="cur-price">—</span>
    <span id="cur-chg">—</span>
  </div>
</header>

<!-- ══ TOOLBAR ══ -->
<div class="toolbar">
  <span class="tf-label">TF</span>
  <button class="btn" id="tf-1m"  onclick="setTF('1m')">1m</button>
  <button class="btn" id="tf-5m"  onclick="setTF('5m')">5m</button>
  <button class="btn" id="tf-15m" onclick="setTF('15m')">15m</button>
  <button class="btn" id="tf-1h"  onclick="setTF('1h')">1h</button>

  <div class="sep"></div>
  <span class="tf-label">TYPE</span>
  <button class="btn active" id="ct-candle" onclick="setCT('candle')">🕯 Candle</button>
  <button class="btn" id="ct-bar"    onclick="setCT('bar')">⊟ Bar</button>
  <button class="btn" id="ct-line"   onclick="setCT('line')">⌇ Line</button>
  <button class="btn" id="ct-area"   onclick="setCT('area')">◭ Area</button>
  <div class="sep"></div>
  <button class="btn" onclick="clearDrawings()" style="color:#ff6b00;border-color:#ff650044;">✕ Drawings</button>
  <button class="btn" onclick="fitChart()">⊡ Fit</button>
</div>

<!-- ══ MAIN ══ -->
<div class="main">

  <!-- Drawing Tools -->
  <div class="draw-panel">
    <div class="tool-btn active" id="tool-cursor" onclick="setTool('cursor')" title="Select">🖱</div>
    <div class="tool-divider"></div>
    <div class="tool-btn" id="tool-hline" onclick="setTool('hline')" title="Horizontal Line">─</div>
    <div class="tool-btn" id="tool-vline" onclick="setTool('vline')" title="Vertical Line">│</div>
    <div class="tool-btn" id="tool-tline" onclick="setTool('tline')" title="Trend Line">╱</div>
    <div class="tool-btn" id="tool-ray"   onclick="setTool('ray')"   title="Ray">⇀</div>

    <div class="tool-btn" id="tool-rect"  onclick="setTool('rect')"  title="Rectangle">▭</div>
    <div class="tool-btn" id="tool-fib"   onclick="setTool('fib')"   title="Fibonacci">Φ</div>
    <div class="tool-divider"></div>
    <div class="tool-btn" id="tool-text"  onclick="setTool('text')"  title="Text (dbl-click)">T</div>
  </div>

  <!-- Chart Area -->
  <div class="chart-area">
    <div class="ohlc-bar" id="ohlc-bar">
      <div class="ohlc-item"><span class="lbl">O</span><span id="oo">—</span></div>
      <div class="ohlc-item"><span class="lbl">H</span><span id="oh" style="color:var(--up)">—</span></div>
      <div class="ohlc-item"><span class="lbl">L</span><span id="ol" style="color:var(--down)">—</span></div>
      <div class="ohlc-item"><span class="lbl">C</span><span id="oc">—</span></div>
      <div class="ohlc-item"><span class="lbl">V</span><span id="ov" style="color:var(--muted)">—</span></div>
    </div>

    <div class="chart-wrap" id="chart-wrap">
      <div id="main-chart"></div>
      <canvas id="draw-canvas"></canvas>
      <div class="chart-legend" id="legend"></div>
    </div>

    <div class="sub-wrap" id="sub-wrap">
      <div id="sub-chart"></div>
    </div>
  </div>

  <!-- Indicators Panel -->
  <div class="ind-panel">
    <div class="panel-head">✦ INDICATORS</div>
    <div class="ind-scroll" id="ind-scroll">

      <div class="grp-label">Moving Averages</div>

        <div class="ind-dot" style="background:#f5d800"></div>
        <div class="ind-name">SMA</div><div class="ind-param">20</div>
      </div>
      <div class="ind-item" id="ii-sma50" onclick="toggleInd('sma50')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#00b0ff"></div>
        <div class="ind-name">SMA</div><div class="ind-param">50</div>
      </div>
      <div class="ind-item" id="ii-ema12" onclick="toggleInd('ema12')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#ff6500"></div>
        <div class="ind-name">EMA</div><div class="ind-param">12</div>
      </div>
      <div class="ind-item" id="ii-ema26" onclick="toggleInd('ema26')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#aa00ff"></div>
        <div class="ind-name">EMA</div><div class="ind-param">26</div>
      </div>
      <div class="ind-item" id="ii-ema200" onclick="toggleInd('ema200')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#ff006e"></div>
        <div class="ind-name">EMA</div><div class="ind-param">200</div>
      </div>

      <div class="grp-label" style="margin-top:10px">Bands</div>
      <div class="ind-item" id="ii-bb" onclick="toggleInd('bb')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#00e676"></div>
        <div class="ind-name">Bollinger Bands</div><div class="ind-param">20,2</div>
      </div>

      <div class="grp-label" style="margin-top:10px">Volume</div>
      <div class="ind-item on" id="ii-vol" onclick="toggleInd('vol')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#4a5570"></div>
        <div class="ind-name">Volume</div><div class="ind-param"></div>
      </div>

      <div class="grp-label" style="margin-top:10px">Oscillators</div>
      <div class="ind-item" id="ii-rsi" onclick="toggleInd('rsi')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#00e676"></div>
        <div class="ind-name">RSI</div><div class="ind-param">14</div>
      </div>
      <div class="ind-item" id="ii-macd" onclick="toggleInd('macd')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#00b0ff"></div>
        <div class="ind-name">MACD</div><div class="ind-param">12,26,9</div>
      </div>
      <div class="ind-item" id="ii-stoch" onclick="toggleInd('stoch')">
        <div class="toggle"></div>
        <div class="ind-dot" style="background:#f5d800"></div>
        <div class="ind-name">Stochastic</div><div class="ind-param">14,3</div>
      </div>

    </div>
  </div>
</div>
<div class="rainbow-footer"></div>

<!-- ══ SCRIPT ══ -->
<script>
// ── Symbol config (base price + volatility per bar)
const SYM_CFG = {
  AAPL:  { base: 185,    vol: 3.2  },
  TSLA:  { base: 250,    vol: 13   },
  NVDA:  { base: 490,    vol: 20   },
  MSFT:  { base: 415,    vol: 5.5  },
  GOOGL: { base: 172,    vol: 4.8  },
  AMZN:  { base: 188,    vol: 5.2  },
  META:  { base: 505,    vol: 15   },
  SPY:   { base: 523,    vol: 3.8  },
  QQQ:   { base: 448,    vol: 6    },
  BTC:   { base: 66500,  vol: 2100 },
  ETH:   { base: 3700,   vol: 190  },
  SOL:   { base: 178,    vol: 16   },
  BNB:   { base: 575,    vol: 22   },
  XRP:   { base: 0.61,   vol: 0.035},
  DOGE:  { base: 0.155,  vol: 0.012},
  NFLX:  { base: 620,    vol: 16   },
  DIS:   { base: 102,    vol: 3.5  },
  AMD:   { base: 178,    vol: 10   },
  INTC:  { base: 34,     vol: 2    },
};

// ── State
let mainChart = null, subChart = null;
let primarySeries = null, volSeries = null;
let subSeriesA = null, subSeriesB = null, subSeriesC = null;
const ind = {}; // indicator series map
const activeInds = new Set(['vol']);
let curSym = 'AAPL', curTF = '1d', curCT = 'candle';
let rawData = [];
let activeTool = 'cursor';
let drawings = [], pendingDraw = null, isDrawing = false;
let canvas, ctx;

// ── Seeded PRNG (Mulberry32)
function mkRng(seed) {
  let s = seed >>> 0;
  return () => { s += 0x6d2b79f5; let t = s; t ^= t >>> 15; t *= 1 | t >>> 7; t ^= t + (t ^= t >>> 14); return ((t >>> 0) / 4294967296); };
}

// ── Generate synthetic OHLCV
function genData(sym, tf) {
  const cfg = SYM_CFG[sym.toUpperCase()] || { base: 100, vol: 5 };
  const seed = [...sym].reduce((a, c) => (a * 31 + c.charCodeAt(0)) >>> 0, tf.length);
  const rng = mkRng(seed);

  const TF_SEC  = { '1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400,'1w':604800 };
  const TF_BARS = { '1m':300,'5m':300,'15m':250,'1h':200,'4h':150,'1d':400,'1w':120 };
  const sec  = TF_SEC[tf]  || 86400;
  const bars = TF_BARS[tf] || 400;
  const now  = Math.floor(Date.now() / 1000);
  const t0   = Math.floor((now - bars * sec) / sec) * sec;

  let price = cfg.base;
  const result = [];
  for (let i = 0; i < bars; i++) {
    const open  = price;
    const move  = (rng() - 0.49) * cfg.vol * (tf === '1w' ? 2.5 : 1);
    const close = Math.max(0.0001, open + move);
    const wick  = Math.abs(close - open) * (0.3 + rng() * 1.2);
    const high  = Math.max(open, close) + wick;
    const low   = Math.max(0.0001, Math.min(open, close) - wick * rng());
    const vol   = Math.floor((rng() * 0.8 + 0.2) * 2e6 * (cfg.base > 1000 ? 0.005 : 1));
    result.push({ time: t0 + i * sec, open, high, low, close, value: vol });
    price = close;
  }
  // Remove any duplicate times just in case
  const seen = new Set();
  return result.filter(d => { if (seen.has(d.time)) return false; seen.add(d.time); return true; });
}

// ── Math helpers
function sma(data, p) {
  return data.flatMap((d, i) => {
    if (i < p - 1) return [];
    const v = data.slice(i - p + 1, i + 1).reduce((a, b) => a + b.close, 0) / p;
    return [{ time: d.time, value: v }];
  });
}

function emaArr(data, p) {
  const k = 2 / (p + 1);
  let e = data[0].close;
  return data.map((d, i) => {
    if (i === 0) return { time: d.time, value: e };
    e = d.close * k + e * (1 - k);
    return { time: d.time, value: e };
  }).slice(p - 1);
}

function emaVals(arr, p) {
  const k = 2 / (p + 1);
  let e = arr[0];
  return arr.map((v, i) => { if (i === 0) return e; e = v * k + e * (1 - k); return e; });
}

function bb(data, p, mult) {
  const upper = [], middle = [], lower = [];
  for (let i = p - 1; i < data.length; i++) {
    const sl = data.slice(i - p + 1, i + 1).map(d => d.close);
    const m  = sl.reduce((a, b) => a + b, 0) / p;
    const sd = Math.sqrt(sl.reduce((a, b) => a + (b - m) ** 2, 0) / p);
    upper.push({ time: data[i].time, value: m + mult * sd });
    middle.push({ time: data[i].time, value: m });
    lower.push({ time: data[i].time, value: m - mult * sd });
  }
  return { upper, middle, lower };
}

function rsi(data, p) {
  let ag = 0, al = 0;
  const out = [];
  for (let i = 1; i < data.length; i++) {
    const chg = data[i].close - data[i - 1].close;
    const g = chg > 0 ? chg : 0, l = chg < 0 ? -chg : 0;
    if (i <= p) { ag += g / p; al += l / p; }
    else { ag = (ag * (p - 1) + g) / p; al = (al * (p - 1) + l) / p; }
    if (i >= p) out.push({ time: data[i].time, value: 100 - 100 / (1 + ag / (al || 1e-10)) });
  }
  return out;
}

function macd(data, fast = 12, slow = 26, sig = 9) {
  const closes = data.map(d => d.close);
  const fE = emaVals(closes, fast);
  const sE = emaVals(closes, slow);
  const line = data.slice(slow - 1).map((d, i) => ({ time: d.time, value: fE[slow - 1 + i] - sE[slow - 1 + i] }));
  const sigE = emaVals(line.map(d => d.value), sig);
  return line.slice(sig - 1).map((d, i) => ({
    time: d.time, macd: d.value, signal: sigE[sig - 1 + i], hist: d.value - sigE[sig - 1 + i]
  }));
}

function stoch(data, k = 14, d = 3) {
  const kLine = [];
  for (let i = k - 1; i < data.length; i++) {
    const sl = data.slice(i - k + 1, i + 1);
    const lo = Math.min(...sl.map(x => x.low));
    const hi = Math.max(...sl.map(x => x.high));
    const pct = hi === lo ? 50 : ((data[i].close - lo) / (hi - lo)) * 100;
    kLine.push({ time: data[i].time, value: pct });
  }
  const dLine = kLine.map((_, i) => {
    if (i < d - 1) return null;
    const avg = kLine.slice(i - d + 1, i + 1).reduce((a, b) => a + b.value, 0) / d;
    return { time: kLine[i].time, value: avg };
  }).filter(Boolean);
  return { k: kLine, d: dLine };
}

// ── Chart init
function initMainChart() {
  const el = document.getElementById('main-chart');
  mainChart = LightweightCharts.createChart(el, {
    width: el.clientWidth,
    height: el.clientHeight,
    layout: { background: { type: 'solid', color: '#07090e' }, textColor: '#5a6580', fontFamily: "'Space Mono',monospace" },
    grid: { vertLines: { color: '#0f1420' }, horzLines: { color: '#0f1420' } },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#2a3550', width: 1, style: 1, labelBackgroundColor: '#131825' },
      horzLine: { color: '#2a3550', width: 1, style: 1, labelBackgroundColor: '#131825' },
    },
    rightPriceScale: { borderColor: '#1e2535', textColor: '#5a6580' },
    timeScale: { borderColor: '#1e2535', textColor: '#5a6580', timeVisible: true, secondsVisible: false },
  });

  new ResizeObserver(() => {
    mainChart.applyOptions({ width: el.clientWidth, height: el.clientHeight });
    syncCanvas(); redrawCanvas();
  }).observe(el);

  mainChart.subscribeCrosshairMove(param => {
    if (!param.time || !primarySeries) return;
    const d = param.seriesData.get(primarySeries);
    if (!d) return;
    if (curCT === 'candle' || curCT === 'bar') {
      set('oo', fmt(d.open)); set('oh', fmt(d.high));
      set('ol', fmt(d.low));  set('oc', fmt(d.close));
    } else {
      set('oo', '—'); set('oh', '—'); set('ol', '—'); set('oc', fmt(d.value));
    }
    const raw = rawData.find(r => r.time === param.time);
    set('ov', raw ? fmtV(raw.value) : '—');
  });

  mainChart.timeScale().subscribeVisibleLogicalRangeChange(() => {
    redrawCanvas();
    if (subChart) {
      try {
        const r = mainChart.timeScale().getVisibleLogicalRange();
        if (r) subChart.timeScale().setVisibleLogicalRange(r);
      } catch(e) {}
    }
  });
}

function initSubChart() {
  const el = document.getElementById('sub-chart');
  subChart = LightweightCharts.createChart(el, {
    width: el.clientWidth,
    height: el.clientHeight,
    layout: { background: { type: 'solid', color: '#07090e' }, textColor: '#5a6580', fontFamily: "'Space Mono',monospace" },
    grid: { vertLines: { color: '#0c101a' }, horzLines: { color: '#0c101a' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#2a3550', width:1, style:1, labelBackgroundColor:'#131825' },
      horzLine: { color: '#2a3550', width:1, style:1, labelBackgroundColor:'#131825' } },
    rightPriceScale: { borderColor: '#1e2535', textColor: '#5a6580' },
    timeScale: { borderColor: '#1e2535', textColor: '#5a6580', timeVisible: true, secondsVisible: false },
  });
  new ResizeObserver(() => subChart.applyOptions({ width: el.clientWidth, height: el.clientHeight })).observe(el);
}

// ── Series management
function removeSeries(s) { if (s) try { mainChart.removeSeries(s); } catch(e) {} }
function removeSubSeries(s) { if (s && subChart) try { subChart.removeSeries(s); } catch(e) {} }

function clearAll() {
  removeSeries(primarySeries); primarySeries = null;
  removeSeries(volSeries);     volSeries = null;
  for (const k of Object.keys(ind)) { removeSeries(ind[k]); ind[k] = null; }
  removeSubSeries(subSeriesA); removeSubSeries(subSeriesB); removeSubSeries(subSeriesC);
  subSeriesA = subSeriesB = subSeriesC = null;
}

function addPrimary() {
  const cData = rawData.map(({ time, open, high, low, close }) => ({ time, open, high, low, close }));
  const lData = rawData.map(({ time, close }) => ({ time, value: close }));

  if (curCT === 'candle') {
    primarySeries = mainChart.addCandlestickSeries({
      upColor:'#00d68f', downColor:'#ff3d6b',
      borderUpColor:'#00d68f', borderDownColor:'#ff3d6b',
      wickUpColor:'#00d68f', wickDownColor:'#ff3d6b',
    });
    primarySeries.setData(cData);
  } else if (curCT === 'bar') {
    primarySeries = mainChart.addBarSeries({ upColor:'#00d68f', downColor:'#ff3d6b' });
    primarySeries.setData(cData);
  } else if (curCT === 'line') {
    primarySeries = mainChart.addLineSeries({ color:'#00b0ff', lineWidth:2 });
    primarySeries.setData(lData);
  } else {
    primarySeries = mainChart.addAreaSeries({
      lineColor:'#00b0ff', topColor:'rgba(0,176,255,.35)', bottomColor:'rgba(0,176,255,0)', lineWidth:2
    });
    primarySeries.setData(lData);
  }
}

function addVol() {
  volSeries = mainChart.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' });
  mainChart.priceScale('vol').applyOptions({ scaleMargins:{top:.82,bottom:0} });
  volSeries.setData(rawData.map(d => ({
    time: d.time,
    value: d.value,
    color: d.close >= d.open ? 'rgba(0,214,143,.32)' : 'rgba(255,61,107,.32)'
  })));
  ind['vol'] = volSeries;
}

// ── Refresh chart
function refresh() {
  rawData = genData(curSym, curTF);
  clearAll();
  addPrimary();
  // Re-apply active indicators
  for (const name of [...activeInds]) applyInd(name);
  updatePrice();
  updateLegend();
  fitChart();
}

// ── Indicators
const IND_DEF = {
  sma20:  { color:'#f5d800', w:1,  style:0, label:'SMA 20'  },
  sma50:  { color:'#00b0ff', w:1,  style:0, label:'SMA 50'  },
  ema12:  { color:'#ff6500', w:1,  style:2, label:'EMA 12'  },
  ema26:  { color:'#aa00ff', w:1,  style:2, label:'EMA 26'  },
  ema200: { color:'#ff006e', w:1,  style:2, label:'EMA 200' },
  bb:     { color:'#00e676', w:1,  style:0, label:'BB(20,2)'},
  vol:    { color:'#4a5570', w:1,  style:0, label:'Volume'  },
  rsi:    { color:'#00e676', w:2,  style:0, label:'RSI 14'  },
  macd:   { color:'#00b0ff', w:2,  style:0, label:'MACD'    },
  stoch:  { color:'#f5d800', w:2,  style:0, label:'STOCH'   },
};

function lineSeries(color, w, style, extra = {}) {
  return mainChart.addLineSeries({
    color, lineWidth: w, lineStyle: style,
    priceLineVisible: false, lastValueVisible: false, ...extra
  });
}

function applyInd(name) {
  if (!rawData.length) return;

  if (name === 'vol') { addVol(); return; }

  if (name === 'sma20') {
    ind.sma20 = lineSeries('#f5d800', 1, 0);
    ind.sma20.setData(sma(rawData, 20));
  }
  if (name === 'sma50') {
    ind.sma50 = lineSeries('#00b0ff', 1, 0);
    ind.sma50.setData(sma(rawData, 50));
  }
  if (name === 'ema12') {
    ind.ema12 = lineSeries('#ff6500', 1, 2);
    ind.ema12.setData(emaArr(rawData, 12));
  }
  if (name === 'ema26') {
    ind.ema26 = lineSeries('#aa00ff', 1, 2);
    ind.ema26.setData(emaArr(rawData, 26));
  }
  if (name === 'ema200') {
    ind.ema200 = lineSeries('#ff006e', 1, 2);
    ind.ema200.setData(emaArr(rawData, 200));
  }
  if (name === 'bb') {
    const b = bb(rawData, 20, 2);
    ind.bbU = lineSeries('#00e676', 1, 2); ind.bbU.setData(b.upper);
    ind.bbM = lineSeries('#00e67666', 1, 0); ind.bbM.setData(b.middle);
    ind.bbL = lineSeries('#00e676', 1, 2); ind.bbL.setData(b.lower);
  }
  if (name === 'rsi') {
    clearSubChart();
    openSubChart();
    const r = rsi(rawData, 14);
    subSeriesA = subChart.addLineSeries({ color:'#00e676', lineWidth:2, priceLineVisible:false, lastValueVisible:true });
    subSeriesA.setData(r);
    // Overbought/oversold lines
    if (r.length > 1) {
      const ob = subChart.addLineSeries({ color:'rgba(255,61,107,.45)', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
      const os = subChart.addLineSeries({ color:'rgba(0,214,143,.45)', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
      ob.setData([{time:r[0].time,value:70},{time:r[r.length-1].time,value:70}]);
      os.setData([{time:r[0].time,value:30},{time:r[r.length-1].time,value:30}]);
    }
  }
  if (name === 'macd') {
    clearSubChart();
    openSubChart();
    const m = macd(rawData);
    subSeriesA = subChart.addLineSeries({ color:'#00b0ff', lineWidth:2, priceLineVisible:false, lastValueVisible:false });
    subSeriesA.setData(m.map(d => ({ time: d.time, value: d.macd })));
    subSeriesB = subChart.addLineSeries({ color:'#ff6500', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
    subSeriesB.setData(m.map(d => ({ time: d.time, value: d.signal })));
    subSeriesC = subChart.addHistogramSeries({ priceLineVisible:false, lastValueVisible:false });
    subSeriesC.setData(m.map(d => ({ time: d.time, value: d.hist, color: d.hist >= 0 ? 'rgba(0,214,143,.65)' : 'rgba(255,61,107,.65)' })));
  }
  if (name === 'stoch') {
    clearSubChart();
    openSubChart();
    const st = stoch(rawData, 14, 3);
    subSeriesA = subChart.addLineSeries({ color:'#f5d800', lineWidth:2, priceLineVisible:false, lastValueVisible:false });
    subSeriesA.setData(st.k);
    subSeriesB = subChart.addLineSeries({ color:'#ff6500', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
    subSeriesB.setData(st.d);
    // OB/OS
    if (st.k.length > 1) {
      const ob = subChart.addLineSeries({ color:'rgba(255,61,107,.45)', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
      const os = subChart.addLineSeries({ color:'rgba(0,214,143,.45)', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
      ob.setData([{time:st.k[0].time,value:80},{time:st.k[st.k.length-1].time,value:80}]);
      os.setData([{time:st.k[0].time,value:20},{time:st.k[st.k.length-1].time,value:20}]);
    }
  }
}

function removeInd(name) {
  if (name === 'vol') { removeSeries(ind.vol); ind.vol = null; volSeries = null; return; }
  if (name === 'bb')  { ['bbU','bbM','bbL'].forEach(k => { removeSeries(ind[k]); ind[k] = null; }); return; }
  if (name === 'rsi' || name === 'macd' || name === 'stoch') {
    if (!activeInds.has('rsi') && !activeInds.has('macd') && !activeInds.has('stoch')) {
      closeSubChart();
    } else {
      clearSubChart();
      // re-draw whichever oscillator is still active
      for (const osc of ['rsi','macd','stoch']) {
        if (activeInds.has(osc)) { applyInd(osc); break; }
      }
    }
    return;
  }
  removeSeries(ind[name]); ind[name] = null;
}

function clearSubChart() {
  removeSubSeries(subSeriesA); removeSubSeries(subSeriesB); removeSubSeries(subSeriesC);
  subSeriesA = subSeriesB = subSeriesC = null;
}

function openSubChart() {
  document.getElementById('sub-wrap').classList.add('open');
  if (!subChart) initSubChart();
}

function closeSubChart() {
  clearSubChart();
  document.getElementById('sub-wrap').classList.remove('open');
}

function toggleInd(name) {
  const el = document.getElementById('ii-' + name);
  if (activeInds.has(name)) {
    activeInds.delete(name);
    el.classList.remove('on');
    removeInd(name);
  } else {
    // Only one oscillator at a time
    if (['rsi','macd','stoch'].includes(name)) {
      for (const osc of ['rsi','macd','stoch']) {
        if (activeInds.has(osc)) {
          activeInds.delete(osc);
          document.getElementById('ii-' + osc).classList.remove('on');
        }
      }
      clearSubChart();
    }
    activeInds.add(name);
    el.classList.add('on');
    applyInd(name);
  }
  updateLegend();
}

// ── UI helpers
function setTF(tf) {
  document.querySelectorAll('[id^="tf-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('tf-' + tf).classList.add('active');
  curTF = tf; refresh();
}

function setCT(ct) {
  document.querySelectorAll('[id^="ct-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('ct-' + ct).classList.add('active');
  curCT = ct; refresh();
}

function loadSymbol() {
  const v = document.getElementById('sym-input').value.trim().toUpperCase();
  if (v) { curSym = v; document.getElementById('sym-input').value = v; }
  refresh();
}

function qs(sym) {
  document.getElementById('sym-input').value = sym;
  curSym = sym; refresh();
}

function fitChart() {
  if (mainChart) mainChart.timeScale().fitContent();
  if (subChart) subChart.timeScale().fitContent();
}

function fmt(v) {
  if (v == null) return '—';
  if (v >= 10000) return v.toFixed(0);
  if (v >= 100) return v.toFixed(2);
  if (v >= 1) return v.toFixed(3);
  return v.toFixed(5);
}

function fmtV(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return v.toFixed(0);
}

function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

function updatePrice() {
  if (!rawData.length) return;
  const last = rawData[rawData.length - 1];
  const prev = rawData[rawData.length - 2] || last;
  const chg = last.close - prev.close;
  const pct = (chg / prev.close) * 100;
  set('cur-sym', curSym);
  const el = document.getElementById('cur-price');
  el.textContent = fmt(last.close);
  el.style.color = chg >= 0 ? 'var(--up)' : 'var(--down)';
  const ce = document.getElementById('cur-chg');
  ce.textContent = `${chg >= 0 ? '+' : ''}${fmt(chg)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
  ce.className = chg >= 0 ? 'chg-up' : 'chg-down';
}

function updateLegend() {
  const pairs = [
    ['sma20','#f5d800','SMA 20'],['sma50','#00b0ff','SMA 50'],
    ['ema12','#ff6500','EMA 12'],['ema26','#aa00ff','EMA 26'],['ema200','#ff006e','EMA 200'],
    ['bb','#00e676','BB(20,2)'],
  ];
  document.getElementById('legend').innerHTML = pairs.filter(([n]) => activeInds.has(n)).map(([,c,l]) =>
    `<div class="legend-row"><div class="legend-line" style="background:${c}"></div><span class="legend-txt" style="color:${c}">${l}</span></div>`
  ).join('');
}

// ── Drawing tools
function initCanvas() {
  canvas = document.getElementById('draw-canvas');
  ctx = canvas.getContext('2d');
  syncCanvas();
  canvas.addEventListener('mousedown', onMD);
  canvas.addEventListener('mousemove', onMM);
  canvas.addEventListener('mouseup', onMU);
  canvas.addEventListener('dblclick', onDB);
}

function syncCanvas() {
  if (!canvas) return;
  const wrap = document.getElementById('chart-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

function setTool(t) {
  activeTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t).classList.add('active');
  canvas.classList.toggle('draw-mode', t !== 'cursor');
  isDrawing = false; pendingDraw = null; redrawCanvas();
}

function getCoords(e) {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  let time = null, price = null;
  try { time = mainChart.timeScale().coordinateToTime(x); } catch(e) {}
  try { if (primarySeries && primarySeries.coordinateToPrice) price = primarySeries.coordinateToPrice(y); } catch(e) {}
  return { x, y, time, price };
}

function toPx(time, price) {
  let x = null, y = null;
  try { x = mainChart.timeScale().timeToCoordinate(time); } catch(e) {}
  try { if (primarySeries && primarySeries.priceToCoordinate) y = primarySeries.priceToCoordinate(price); } catch(e) {}
  return { x, y };
}

const RB_COLORS = ['#ff006e','#ff6500','#f5d800','#00e676','#00b0ff','#aa00ff'];
let colorIdx = 0;
function nextColor() { return RB_COLORS[(colorIdx++) % RB_COLORS.length]; }

function onMD(e) {
  if (activeTool === 'cursor') return;
  const c = getCoords(e);
  if (activeTool === 'hline') { drawings.push({ type:'hline', price:c.price, color:nextColor() }); redrawCanvas(); return; }
  if (activeTool === 'vline') { drawings.push({ type:'vline', time:c.time, x:c.x, color:nextColor() }); redrawCanvas(); return; }
  isDrawing = true;
  pendingDraw = { type:activeTool, x1:c.x,y1:c.y,x2:c.x,y2:c.y, time1:c.time,price1:c.price,time2:c.time,price2:c.price,
    color:nextColor(), fibs:[0,.236,.382,.5,.618,.786,1] };
}

function onMM(e) {
  if (!isDrawing || !pendingDraw) return;
  const c = getCoords(e);
  Object.assign(pendingDraw, { x2:c.x,y2:c.y,time2:c.time,price2:c.price });
  redrawCanvas();
}

function onMU(e) {
  if (!isDrawing || !pendingDraw) return;
  isDrawing = false;
  const c = getCoords(e);
  Object.assign(pendingDraw, { x2:c.x,y2:c.y,time2:c.time,price2:c.price });
  if (Math.hypot(pendingDraw.x2-pendingDraw.x1, pendingDraw.y2-pendingDraw.y1) > 4) {
    drawings.push({ ...pendingDraw });
  }
  pendingDraw = null; redrawCanvas();
}

function onDB(e) {
  if (activeTool !== 'text') return;
  const c = getCoords(e);
  const txt = prompt('Annotation text:');
  if (txt) { drawings.push({ type:'text', x:c.x, y:c.y, text:txt, color:nextColor() }); redrawCanvas(); }
}

function clearDrawings() { drawings = []; pendingDraw = null; isDrawing = false; redrawCanvas(); }

function redrawCanvas() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const all = [...drawings, ...(pendingDraw ? [pendingDraw] : [])];

  for (const d of all) {
    ctx.save();
    ctx.strokeStyle = d.color || '#00e676';
    ctx.fillStyle   = d.color || '#00e676';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([]);
    ctx.shadowBlur  = 4;
    ctx.shadowColor = d.color || '#00e676';

    if (d.type === 'hline' && d.price != null && primarySeries) {
      try {
        const y = primarySeries.priceToCoordinate(d.price);
        if (y != null) {
          ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.font = '9px Space Mono, monospace';
          ctx.fillText(fmt(d.price), 4, y - 4);
        }
      } catch(e) {}
    }

    else if (d.type === 'vline') {
      let x = d.x;
      if (d.time != null) { try { const cx = mainChart.timeScale().timeToCoordinate(d.time); if (cx != null) x = cx; } catch(e) {} }
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }

    else if (d.type === 'tline' || d.type === 'ray') {
      let {x1,y1,x2,y2} = d;
      if (d.time1 != null && d.price1 != null) { const p = toPx(d.time1,d.price1); if (p.x!=null){x1=p.x;y1=p.y;} }
      if (d.time2 != null && d.price2 != null) { const p = toPx(d.time2,d.price2); if (p.x!=null){x2=p.x;y2=p.y;} }
      if (d.type === 'ray' && x2 !== x1) {
        const slope = (y2-y1)/(x2-x1);
        const ex = x2 > x1 ? canvas.width : 0;
        x2 = ex; y2 = y1 + slope*(ex-x1);
      }
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.beginPath(); ctx.arc(x1,y1,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x2,y2,3,0,Math.PI*2); ctx.fill();
    }

    else if (d.type === 'rect') {
      let {x1,y1,x2,y2} = d;
      if (d.time1 != null && d.price1 != null) { const p = toPx(d.time1,d.price1); if (p.x!=null){x1=p.x;y1=p.y;} }
      if (d.time2 != null && d.price2 != null) { const p = toPx(d.time2,d.price2); if (p.x!=null){x2=p.x;y2=p.y;} }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.12; ctx.fillRect(x1,y1,x2-x1,y2-y1);
      ctx.globalAlpha = 1;    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
    }

    else if (d.type === 'fib') {
      let {x1,y1,x2,y2} = d;
      if (d.time1 != null && d.price1 != null) { const p = toPx(d.time1,d.price1); if (p.x!=null){x1=p.x;y1=p.y;} }
      if (d.time2 != null && d.price2 != null) { const p = toPx(d.time2,d.price2); if (p.x!=null){x2=p.x;y2=p.y;} }
      d.fibs.forEach((ratio, i) => {
        const fy = y1 + (y2-y1)*ratio;
        ctx.strokeStyle = RB_COLORS[i % RB_COLORS.length];
        ctx.shadowColor = RB_COLORS[i % RB_COLORS.length];
        ctx.setLineDash([5,4]);
        ctx.beginPath(); ctx.moveTo(Math.min(x1,x2),fy); ctx.lineTo(Math.max(x1,x2),fy); ctx.stroke();
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
        ctx.fillStyle = RB_COLORS[i % RB_COLORS.length];
        ctx.font = '9px Space Mono, monospace';
        ctx.fillText(`${(ratio*100).toFixed(1)}%`, Math.min(x1,x2)+4, fy-3);
      });
    }

    else if (d.type === 'text') {
      ctx.shadowBlur = 6;
      ctx.font = 'bold 12px Space Mono, monospace';
      ctx.fillText(d.text, d.x, d.y);
    }

    ctx.restore();
  }
}

// ── Bootstrap
window.addEventListener('load', () => {
  initMainChart();
  initCanvas();
  refresh();

  document.getElementById('sym-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadSymbol();
  });
});

window.addEventListener('resize', () => { syncCanvas(); redrawCanvas(); });
</script>
</body>
</html>
