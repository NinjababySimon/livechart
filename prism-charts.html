<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRISM CHARTS</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:    #0b0e11; --bg2: #161a1f; --bg3: #1e2329; --bg4: #2b3139;
  --bdr:   #2b3139; --bdr2: #363c45;
  --txt:   #eaecef; --mut: #848e9c; --dim: #474d57;
  --up:    #0ecb81; --dn:  #f6465d;
  --up-bg: rgba(14,203,129,.10); --dn-bg: rgba(246,70,93,.10);
  --gold:  #f0b90b;
  --r1:#ff006e;--r2:#ff6500;--r3:#f5d800;--r4:#0ecb81;--r5:#00b0ff;--r6:#a855f7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{display:flex;flex-direction:column;font-family:'Rajdhani',sans-serif;color:var(--txt);}

@keyframes rbshift{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.rb-bar{
  height:3px;flex-shrink:0;
  background:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1));
  background-size:300%;animation:rbshift 4s linear infinite;
}
.rb-txt{
  background:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6));
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:rbshift 5s linear infinite;
}

/* ═══ HEADER ═══ */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  padding:10px 14px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;min-height:62px;overflow:hidden;
}
.pair-block{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.pair-name{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;letter-spacing:.5px;line-height:1;}
.pair-desc{font-size:10px;color:var(--mut);letter-spacing:.5px;}

.price-big{
  font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;
  line-height:1;flex-shrink:0;transition:color .25s;
}
.price-big.up{color:var(--up);}
.price-big.dn{color:var(--dn);}
.price-big.loading{color:var(--mut);animation:blink 1.2s ease infinite;}

.stats-row{display:flex;gap:18px;align-items:center;overflow-x:auto;flex:1;}
.stats-row::-webkit-scrollbar{display:none;}
.stat{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.stat-lbl{font-size:10px;color:var(--mut);}
.stat-val{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.stat-val.up{color:var(--up);}
.stat-val.dn{color:var(--dn);}

.pairs-btn{
  margin-left:auto;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--bdr2);color:var(--txt);
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;
  padding:7px 13px;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;
}
.pairs-btn:hover{border-color:var(--r5);color:var(--r5);}
.pairs-btn .arr{transition:transform .2s;}
.pairs-btn.open .arr{transform:rotate(180deg);}

/* ═══ ERROR BANNER ═══ */
.err-bar{
  display:none;padding:6px 14px;flex-shrink:0;
  background:rgba(246,70,93,.10);border-bottom:1px solid rgba(246,70,93,.25);
  font-size:11px;color:var(--dn);letter-spacing:.3px;align-items:center;gap:8px;
}
.err-bar.show{display:flex;}

/* ═══ TOOLBAR ═══ */
.toolbar{
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:1px;padding:0 10px;height:38px;
  flex-shrink:0;overflow-x:auto;
}
.toolbar::-webkit-scrollbar{height:2px;}
.toolbar::-webkit-scrollbar-thumb{background:var(--bdr);}
.tb-lbl{font-size:9px;color:var(--dim);letter-spacing:1px;padding:0 5px;flex-shrink:0;}
.tb-btn{
  background:none;border:none;color:var(--mut);
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;
  padding:5px 9px;border-radius:5px;cursor:pointer;transition:all .15s;flex-shrink:0;white-space:nowrap;
}
.tb-btn:hover{background:var(--bg4);color:var(--txt);}
.tb-btn.active{background:var(--bg4);color:var(--gold);}
.tb-sep{width:1px;height:18px;background:var(--bdr2);flex-shrink:0;margin:0 4px;}

/* ═══ BODY ═══ */
.body-row{display:flex;flex:1;overflow:hidden;}

/* ═══ CHART ZONE ═══ */
.chart-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}
.ohlc-strip{
  display:flex;align-items:center;gap:10px;padding:5px 12px;flex-shrink:0;
  background:rgba(11,14,17,.97);border-bottom:1px solid var(--bdr);
  font-family:'JetBrains Mono',monospace;font-size:10px;overflow-x:auto;
}
.ohlc-strip::-webkit-scrollbar{display:none;}
.ohlc-i{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.ohlc-i .lb{color:var(--dim);}

.chart-main{flex:1;position:relative;overflow:hidden;}
#main-chart{width:100%;height:100%;}

.cover{
  position:absolute;inset:0;background:rgba(11,14,17,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:50;transition:opacity .3s;
}
.cover.gone{opacity:0;pointer-events:none;}
.spinner{width:28px;height:28px;border:3px solid var(--bdr2);border-top-color:var(--r5);border-radius:50%;animation:spin .7s linear infinite;}
.cover-txt{font-size:11px;color:var(--mut);letter-spacing:1.5px;}

.chart-legend{
  position:absolute;top:8px;left:8px;z-index:10;pointer-events:none;
  display:flex;flex-wrap:wrap;gap:5px;
}
.leg-tag{
  display:flex;align-items:center;gap:4px;padding:2px 7px;
  background:rgba(11,14,17,.82);border:1px solid var(--bdr);border-radius:4px;
  font-size:10px;font-family:'JetBrains Mono',monospace;
}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.sub-wrap{height:0;overflow:hidden;transition:height .22s ease;flex-shrink:0;}
.sub-wrap.open{height:128px;border-top:1px solid var(--bdr);}
#sub-chart{width:100%;height:100%;}

/* ═══ WATCHLIST — RIGHT ═══ */
.watchlist{
  width:0;background:var(--bg2);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .28s cubic-bezier(.4,0,.2,1);
}
.watchlist.open{width:236px;}

.wl-head{padding:11px 12px 9px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.wl-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2.5px;margin-bottom:9px;}

.wl-add{display:flex;gap:6px;}
.wl-input{
  flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  padding:6px 8px;border-radius:5px;outline:none;text-transform:uppercase;min-width:0;
  transition:border-color .2s;
}
.wl-input:focus{border-color:var(--r5);}
.wl-input::placeholder{color:var(--dim);font-size:10px;text-transform:none;font-weight:400;}
.wl-add-btn{
  background:linear-gradient(135deg,var(--r4),var(--r5));border:none;color:#000;
  font-weight:700;font-family:'Rajdhani',sans-serif;font-size:18px;
  padding:0 12px;border-radius:5px;cursor:pointer;flex-shrink:0;transition:opacity .15s;
}
.wl-add-btn:hover{opacity:.82;}
.wl-search{
  width:100%;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);
  font-family:'Rajdhani',sans-serif;font-size:13px;padding:6px 9px;
  border-radius:5px;outline:none;transition:border-color .2s;margin-top:7px;
}
.wl-search:focus{border-color:var(--r5);}

.wl-list{flex:1;overflow-y:auto;padding:4px 0;}
.wl-list::-webkit-scrollbar{width:3px;}
.wl-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

.wl-item{
  display:flex;align-items:center;padding:9px 12px;cursor:pointer;
  transition:background .1s;border-right:2px solid transparent;gap:8px;position:relative;
}
.wl-item:hover{background:var(--bg3);}
.wl-item.active{background:var(--bg3);border-right-color:var(--gold);}
.wl-sym{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;flex:1;line-height:1.2;}
.wl-sym .qt{color:var(--mut);font-size:10px;font-weight:400;}
.wl-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.wl-price{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
.wl-chg{font-size:11px;font-weight:700;padding:1px 5px;border-radius:3px;min-width:54px;text-align:right;}
.wl-chg.up{color:var(--up);background:var(--up-bg);}
.wl-chg.dn{color:var(--dn);background:var(--dn-bg);}
.wl-del{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:16px;padding:2px 4px;border-radius:3px;
  opacity:0;transition:opacity .15s,color .15s;line-height:1;
}
.wl-item:hover .wl-del{opacity:1;}
.wl-del:hover{color:var(--dn);}
.wl-empty{padding:28px 14px;text-align:center;color:var(--dim);font-size:12px;line-height:1.8;}
.wl-spin-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;color:var(--mut);font-size:11px;}
.wl-spinner{width:14px;height:14px;border:2px solid var(--bdr2);border-top-color:var(--r5);border-radius:50%;animation:spin .7s linear infinite;}

/* ═══ MOBILE SHEET ═══ */
.mob-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s;}
.mob-bg.on{opacity:1;pointer-events:all;}
.mob-sheet{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg2);border-top:1px solid var(--bdr);
  border-radius:18px 18px 0 0;max-height:75vh;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  flex-direction:column;overflow:hidden;
}
.mob-sheet.open{transform:translateY(0);}
.pill{width:38px;height:4px;background:var(--bdr2);border-radius:2px;margin:12px auto 10px;flex-shrink:0;}
.mob-head{padding:0 14px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.mob-body{flex:1;overflow-y:auto;padding-bottom:24px;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .watchlist{display:none!important;}
  .mob-bg,.mob-sheet{display:flex;}
  .price-big{font-size:22px;}
  .pair-name{font-size:15px;}
  .stats-row{gap:10px;}
  .stat-val{font-size:12px;}
  .stat-lbl{font-size:9px;}
  .ohlc-strip{gap:7px;font-size:9px;}
}
</style>
</head>
<body>

<div class="rb-bar"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="pair-block">
    <div class="pair-name rb-txt" id="hdr-pair">BTC/USDT</div>
    <div class="pair-desc" id="hdr-desc">Bitcoin · Bybit Spot</div>
  </div>
  <div class="price-big loading" id="hdr-price">Loading…</div>
  <div class="stats-row">
    <div class="stat"><span class="stat-lbl">24h Change</span><span class="stat-val" id="hdr-chg">—</span></div>
    <div class="stat"><span class="stat-lbl">24h High</span><span class="stat-val" id="hdr-hi" style="color:var(--up)">—</span></div>
    <div class="stat"><span class="stat-lbl">24h Low</span><span class="stat-val" id="hdr-lo" style="color:var(--dn)">—</span></div>
    <div class="stat"><span class="stat-lbl">24h Vol</span><span class="stat-val" id="hdr-vol" style="color:var(--mut)">—</span></div>
  </div>
  <button class="pairs-btn open" id="pairs-btn" onclick="toggleWL()">☰ Pairs <span class="arr">▾</span></button>
</div>

<!-- ERROR -->
<div class="err-bar" id="err-bar">⚠ &nbsp;<span id="err-msg">Unable to reach Bybit API.</span></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="tb-lbl">TF</span>
  <button class="tb-btn" id="tf-1m"  onclick="setTF('1m','1')">1m</button>
  <button class="tb-btn" id="tf-5m"  onclick="setTF('5m','5')">5m</button>
  <button class="tb-btn" id="tf-15m" onclick="setTF('15m','15')">15m</button>
  <button class="tb-btn" id="tf-1h"  onclick="setTF('1h','60')">1h</button>
  <button class="tb-btn" id="tf-4h"  onclick="setTF('4h','240')">4h</button>
  <button class="tb-btn active" id="tf-1d" onclick="setTF('1d','D')">1D</button>
  <button class="tb-btn" id="tf-1w"  onclick="setTF('1w','W')">1W</button>
  <div class="tb-sep"></div>
  <span class="tb-lbl">Type</span>
  <button class="tb-btn active" id="ct-candle" onclick="setCT('candle')">Candle</button>
  <button class="tb-btn" id="ct-line"          onclick="setCT('line')">Line</button>
  <button class="tb-btn" id="ct-area"          onclick="setCT('area')">Area</button>
  <div class="tb-sep"></div>
  <span class="tb-lbl">Ind</span>
  <button class="tb-btn" id="ii-ma"   onclick="toggleInd('ma')">MA</button>
  <button class="tb-btn" id="ii-bb"   onclick="toggleInd('bb')">BB</button>
  <button class="tb-btn active" id="ii-vol" onclick="toggleInd('vol')">Vol</button>
  <button class="tb-btn" id="ii-rsi"  onclick="toggleInd('rsi')">RSI</button>
  <button class="tb-btn" id="ii-macd" onclick="toggleInd('macd')">MACD</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="fitChart()">Fit</button>
</div>

<!-- BODY -->
<div class="body-row">

  <!-- Chart -->
  <div class="chart-zone">
    <div class="ohlc-strip">
      <div class="ohlc-i"><span class="lb">O</span><span id="oo">—</span></div>
      <div class="ohlc-i"><span class="lb">H</span><span id="oh" style="color:var(--up)">—</span></div>
      <div class="ohlc-i"><span class="lb">L</span><span id="ol" style="color:var(--dn)">—</span></div>
      <div class="ohlc-i"><span class="lb">C</span><span id="oc">—</span></div>
      <div class="ohlc-i"><span class="lb">V</span><span id="ov" style="color:var(--mut)">—</span></div>
    </div>
    <div class="chart-main">
      <div id="main-chart"></div>
      <div class="cover" id="cover">
        <div class="spinner"></div>
        <div class="cover-txt" id="cover-txt">FETCHING MARKET DATA…</div>
      </div>
      <div class="chart-legend" id="legend"></div>
    </div>
    <div class="sub-wrap" id="sub-wrap"><div id="sub-chart"></div></div>
  </div>

  <!-- Watchlist RIGHT -->
  <div class="watchlist open" id="watchlist">
    <div class="wl-head">
      <div class="wl-title rb-txt">✦ WATCHLIST</div>
      <div class="wl-add">
        <input class="wl-input" id="wl-inp" type="text" placeholder="e.g. ETH/USDT or SOL" autocomplete="off" spellcheck="false"/>
        <button class="wl-add-btn" onclick="addPair('wl-inp')">+</button>
      </div>
      <input class="wl-search" id="wl-srch" type="text" placeholder="Search…" oninput="renderList()"/>
    </div>
    <div class="wl-list" id="wl-list">
      <div class="wl-spin-row"><div class="wl-spinner"></div>Loading prices…</div>
    </div>
  </div>
</div>

<!-- MOBILE SHEET -->
<div class="mob-bg" id="mob-bg" onclick="closeMob()"></div>
<div class="mob-sheet" id="mob-sheet">
  <div class="pill"></div>
  <div class="mob-head">
    <div class="wl-title rb-txt" style="margin-bottom:9px;">✦ WATCHLIST</div>
    <div class="wl-add">
      <input class="wl-input" id="wl-inp-m" type="text" placeholder="e.g. BNB/USDT or DOGE" autocomplete="off" spellcheck="false"/>
      <button class="wl-add-btn" onclick="addPair('wl-inp-m')">+</button>
    </div>
    <input class="wl-search" id="wl-srch-m" type="text" placeholder="Search…" oninput="renderList()" style="margin-top:7px;"/>
  </div>
  <div class="mob-body"><div class="wl-list" id="wl-list-m"></div></div>
</div>

<script>
// ═══════════════════════════════════════════
//  BYBIT API  (public market data, no key needed)
//  Rate limits: 120 req/s on market endpoints — very generous
// ═══════════════════════════════════════════
const BASE = 'https://api.bybit.com/v5/market';

// pair  "BTC/USDT"  →  bybit symbol  "BTCUSDT"
const toSym = p => p.replace('/','');
// bybit symbol "BTCUSDT" → "BTC/USDT"  (handles USDT/BTC/ETH/BNB suffixes)
function toPair(s) {
  for (const q of ['USDT','BTC','ETH','BNB','USDC']) {
    if (s.endsWith(q)) return s.slice(0,-q.length)+'/'+q;
  }
  return s;
}

async function bybitKlines(pair, interval, limit=500) {
  const sym = toSym(pair);
  const url  = `${BASE}/kline?category=spot&symbol=${sym}&interval=${interval}&limit=${limit}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Bybit kline HTTP ${r.status}`);
  const j = await r.json();
  if (j.retCode !== 0) throw new Error(j.retMsg || 'Bybit error');
  // list = [ [startTime, open, high, low, close, volume, turnover], … ]  newest-first → reverse
  return j.result.list.reverse().map(k => ({
    time:  Math.floor(+k[0] / 1000),
    open:  +k[1], high: +k[2], low: +k[3], close: +k[4],
    value: +k[5]    // base-asset volume
  }));
}

async function bybitTicker(pair) {
  const sym = toSym(pair);
  const url  = `${BASE}/tickers?category=spot&symbol=${sym}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Bybit ticker HTTP ${r.status}`);
  const j = await r.json();
  if (j.retCode !== 0) throw new Error(j.retMsg);
  return j.result.list[0]; // { lastPrice, highPrice24h, lowPrice24h, price24hPcnt, volume24h, ... }
}

// fetch ALL spot tickers at once for the watchlist (1 request)
async function bybitAllTickers() {
  const url = `${BASE}/tickers?category=spot`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Bybit tickers HTTP ${r.status}`);
  const j = await r.json();
  if (j.retCode !== 0) throw new Error(j.retMsg);
  const map = {};
  for (const t of j.result.list) map[t.symbol] = t;
  return map;
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const DEFAULTS = ['BTC/USDT','ETH/USDT','BNB/USDT','SOL/USDT','XRP/USDT','DOGE/USDT','ADA/USDT','AVAX/USDT'];
let pairs = (() => { try { return JSON.parse(localStorage.getItem('prism_pairs')) || [...DEFAULTS]; } catch { return [...DEFAULTS]; } })();
let curPair    = pairs[0] || 'BTC/USDT';
let curTFKey   = '1d';  // display key
let curTFApi   = 'D';   // bybit interval
let curCT      = 'candle';
let mainChart  = null, subChart = null;
let primarySer = null;
const indMap   = {};
const activeInds = new Set(['vol']);
let rawData    = [];
let subA=null,subB=null,subC=null;
let wlOpen     = true;
let tickerCache = {};         // sym → ticker object
let wlTimer    = null;
const TF_MAP   = {'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D','1w':'W'};

// ═══════════════════════════════════════════
//  FORMAT
// ═══════════════════════════════════════════
function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  if (v >= 100000) return v.toLocaleString('en-US',{maximumFractionDigits:0});
  if (v >= 1000)   return v.toLocaleString('en-US',{maximumFractionDigits:2});
  if (v >= 1)      return (+v).toFixed(4);
  if (v >= 0.01)   return (+v).toFixed(5);
  return (+v).toFixed(8);
}
function fmtV(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return (+v).toFixed(2);
}
const $  = id => document.getElementById(id);
const st = (id,val) => { const e=$(id); if(e) e.textContent=val; };

// ═══════════════════════════════════════════
//  CHART INIT
// ═══════════════════════════════════════════
function initMain() {
  const el = $('main-chart');
  mainChart = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    layout: { background:{type:'solid',color:'#0b0e11'}, textColor:'#848e9c',
              fontFamily:"'JetBrains Mono',monospace", fontSize:10 },
    grid: { vertLines:{color:'#131720'}, horzLines:{color:'#131720'} },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: {color:'#2b3139',width:1,style:1,labelBackgroundColor:'#1e2329'},
      horzLine: {color:'#2b3139',width:1,style:1,labelBackgroundColor:'#1e2329'},
    },
    rightPriceScale: {borderColor:'#2b3139'},
    timeScale: {borderColor:'#2b3139', timeVisible:true, secondsVisible:false},
    handleScroll: {mouseWheel:true,pressedMouseMove:true,horzTouchDrag:true,vertTouchDrag:false},
    handleScale:  {mouseWheel:true,pinch:true,axisPressedMouseMove:true},
  });
  new ResizeObserver(() => mainChart.applyOptions({width:el.clientWidth,height:el.clientHeight})).observe(el);

  mainChart.subscribeCrosshairMove(param => {
    if (!param.time || !primarySer) return;
    const d = param.seriesData.get(primarySer);
    if (!d) return;
    if (curCT === 'candle') {
      st('oo',fmt(d.open)); st('oh',fmt(d.high)); st('ol',fmt(d.low)); st('oc',fmt(d.close));
    } else {
      ['oo','oh','ol'].forEach(i=>st(i,'—')); st('oc',fmt(d.value));
    }
    const r = rawData.find(x => x.time === param.time);
    st('ov', r ? fmtV(r.value) : '—');
  });
}

function initSub() {
  const el = $('sub-chart');
  subChart = LightweightCharts.createChart(el, {
    width:el.clientWidth, height:el.clientHeight,
    layout:{background:{type:'solid',color:'#0b0e11'},textColor:'#848e9c',
            fontFamily:"'JetBrains Mono',monospace",fontSize:9},
    grid:{vertLines:{color:'#0d1015'},horzLines:{color:'#0d1015'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:'#2b3139',width:1,style:1,labelBackgroundColor:'#1e2329'},
      horzLine:{color:'#2b3139',width:1,style:1,labelBackgroundColor:'#1e2329'}},
    rightPriceScale:{borderColor:'#2b3139'},
    timeScale:{borderColor:'#2b3139',timeVisible:false},
  });
  new ResizeObserver(() => subChart.applyOptions({width:el.clientWidth,height:el.clientHeight})).observe(el);
}

// ═══════════════════════════════════════════
//  SERIES HELPERS
// ═══════════════════════════════════════════
function rmSer(s,c=mainChart){if(s&&c)try{c.removeSeries(s);}catch(_){}}
function clearSubSers(){rmSer(subA,subChart);rmSer(subB,subChart);rmSer(subC,subChart);subA=subB=subC=null;}
function lnSer(color,width,style=0,extra={}){
  return mainChart.addLineSeries({color,lineWidth:width,lineStyle:style,
    priceLineVisible:false,lastValueVisible:false,...extra});
}

function addPrimary() {
  const cd = rawData.map(({time,open,high,low,close})=>({time,open,high,low,close}));
  const ld = rawData.map(({time,close})=>({time,value:close}));
  if (curCT==='candle') {
    primarySer = mainChart.addCandlestickSeries({
      upColor:'#0ecb81',downColor:'#f6465d',
      borderUpColor:'#0ecb81',borderDownColor:'#f6465d',
      wickUpColor:'#0ecb81',wickDownColor:'#f6465d',
    });
    primarySer.setData(cd);
  } else if (curCT==='line') {
    primarySer = mainChart.addLineSeries({color:'#f0b90b',lineWidth:2});
    primarySer.setData(ld);
  } else {
    primarySer = mainChart.addAreaSeries({
      lineColor:'#f0b90b',topColor:'rgba(240,185,11,.22)',bottomColor:'rgba(240,185,11,0)',lineWidth:2});
    primarySer.setData(ld);
  }
}

// ═══════════════════════════════════════════
//  INDICATOR MATH
// ═══════════════════════════════════════════
const smaArr = (data,p) =>
  data.flatMap((d,i) => i<p-1 ? [] : [{time:d.time, value:data.slice(i-p+1,i+1).reduce((a,b)=>a+b.close,0)/p}]);

const emaArr = (data,p) => {
  const k=2/(p+1); let e=data[0].close;
  return data.map((d,i)=>{if(i===0)return{time:d.time,value:e};e=d.close*k+e*(1-k);return{time:d.time,value:e};}).slice(p-1);
};
const emaVals = (arr,p) => {
  const k=2/(p+1); let e=arr[0];
  return arr.map((v,i)=>{if(i===0)return e;e=v*k+e*(1-k);return e;});
};
const bbCalc = (data,p,mult) => {
  const u=[],m=[],l=[];
  for(let i=p-1;i<data.length;i++){
    const sl=data.slice(i-p+1,i+1).map(d=>d.close);
    const mn=sl.reduce((a,b)=>a+b,0)/p;
    const sd=Math.sqrt(sl.reduce((a,b)=>a+(b-mn)**2,0)/p);
    u.push({time:data[i].time,value:mn+mult*sd});
    m.push({time:data[i].time,value:mn});
    l.push({time:data[i].time,value:mn-mult*sd});
  }
  return {u,m,l};
};
const rsiCalc = (data,p) => {
  let ag=0,al=0; const out=[];
  for(let i=1;i<data.length;i++){
    const c=data[i].close-data[i-1].close, g=c>0?c:0, lo=c<0?-c:0;
    if(i<=p){ag+=g/p;al+=lo/p;}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+lo)/p;}
    if(i>=p) out.push({time:data[i].time, value:100-100/(1+ag/(al||1e-9))});
  }
  return out;
};
const macdCalc = data => {
  const cl=data.map(d=>d.close);
  const fe=emaVals(cl,12), se=emaVals(cl,26);
  const line=data.slice(25).map((d,i)=>({time:d.time,value:fe[25+i]-se[25+i]}));
  const sg=emaVals(line.map(d=>d.value),9);
  return line.slice(8).map((d,i)=>({time:d.time,macd:d.value,sig:sg[8+i],hist:d.value-sg[8+i]}));
};

function applyInd(name) {
  if (name==='vol') {
    const vs=mainChart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
    mainChart.priceScale('vol').applyOptions({scaleMargins:{top:.82,bottom:0}});
    vs.setData(rawData.map(d=>({time:d.time,value:d.value,
      color:d.close>=d.open?'rgba(14,203,129,.28)':'rgba(246,70,93,.28)'})));
    indMap.vol=vs; return;
  }
  if (name==='ma') {
    indMap.ma7  = lnSer('#f0b90b',1);   indMap.ma7.setData(smaArr(rawData,7));
    indMap.ma25 = lnSer('#00b0ff',1);   indMap.ma25.setData(smaArr(rawData,25));
    indMap.ma99 = lnSer('#a855f7',1,2); indMap.ma99.setData(smaArr(rawData,99));
  }
  if (name==='bb') {
    const b=bbCalc(rawData,20,2);
    indMap.bbU=lnSer('#0ecb81',1,2); indMap.bbU.setData(b.u);
    indMap.bbM=lnSer('rgba(14,203,129,.35)',1); indMap.bbM.setData(b.m);
    indMap.bbL=lnSer('#0ecb81',1,2); indMap.bbL.setData(b.l);
  }
  if (name==='rsi') {
    clearSubSers(); openSub();
    const r=rsiCalc(rawData,14);
    subA=subChart.addLineSeries({color:'#0ecb81',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
    subA.setData(r);
    if (r.length>1) {
      const ob=subChart.addLineSeries({color:'rgba(246,70,93,.4)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
      const os=subChart.addLineSeries({color:'rgba(14,203,129,.4)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
      ob.setData([{time:r[0].time,value:70},{time:r[r.length-1].time,value:70}]);
      os.setData([{time:r[0].time,value:30},{time:r[r.length-1].time,value:30}]);
    }
  }
  if (name==='macd') {
    clearSubSers(); openSub();
    const m=macdCalc(rawData);
    subA=subChart.addLineSeries({color:'#00b0ff',lineWidth:2,priceLineVisible:false,lastValueVisible:false});
    subA.setData(m.map(d=>({time:d.time,value:d.macd})));
    subB=subChart.addLineSeries({color:'#f0b90b',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
    subB.setData(m.map(d=>({time:d.time,value:d.sig})));
    subC=subChart.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});
    subC.setData(m.map(d=>({time:d.time,value:d.hist,color:d.hist>=0?'rgba(14,203,129,.65)':'rgba(246,70,93,.65)'})));
  }
}

function removeInd(name) {
  const rm=k=>{rmSer(indMap[k]);indMap[k]=null;};
  if(name==='vol') {rm('vol');return;}
  if(name==='ma')  {['ma7','ma25','ma99'].forEach(rm);return;}
  if(name==='bb')  {['bbU','bbM','bbL'].forEach(rm);return;}
  if(name==='rsi'||name==='macd') {
    clearSubSers();
    const other=name==='rsi'?'macd':'rsi';
    if(activeInds.has(other)) applyInd(other); else closeSub();
  }
}

function openSub() {$('sub-wrap').classList.add('open'); if(!subChart)initSub();}
function closeSub(){$('sub-wrap').classList.remove('open');}

function toggleInd(name) {
  const el=$('ii-'+name);
  if(activeInds.has(name)){
    activeInds.delete(name); el.classList.remove('active'); removeInd(name);
  } else {
    if((name==='rsi'||name==='macd')&&(activeInds.has('rsi')||activeInds.has('macd'))){
      ['rsi','macd'].forEach(n=>{if(activeInds.has(n)){activeInds.delete(n);$('ii-'+n).classList.remove('active');}});
      clearSubSers();
    }
    activeInds.add(name); el.classList.add('active'); applyInd(name);
  }
  updateLegend();
}

// ═══════════════════════════════════════════
//  MAIN REFRESH — loads real data from Bybit
// ═══════════════════════════════════════════
async function loadChart(pair, tfKey, tfApi) {
  showCover(true,'FETCHING MARKET DATA…');
  hideErr();
  try {
    // 1. Fetch klines
    rawData = await bybitKlines(pair, tfApi);

    // 2. Tear down old series
    if(primarySer){try{mainChart.removeSeries(primarySer);}catch(_){} primarySer=null;}
    Object.keys(indMap).forEach(k=>{rmSer(indMap[k]);indMap[k]=null;});
    clearSubSers();
    if(!activeInds.has('rsi')&&!activeInds.has('macd')) closeSub();

    // 3. Build primary + indicators
    addPrimary();
    for(const n of [...activeInds]) applyInd(n);
    updateLegend();
    fitChart();

    // 4. Fetch live ticker for header
    const t = await bybitTicker(pair);
    updateHeader(pair, t);
    showCover(false);

    // 5. Refresh watchlist prices (uses already-fetched bulk cache if fresh)
    refreshWLPrices();

  } catch(err) {
    showCover(false);
    showErr(err.message || 'Failed to load data from Bybit');
    console.error(err);
  }
}

function updateHeader(pair, t) {
  const [base] = pair.split('/');
  const price   = parseFloat(t.lastPrice);
  const chgPct  = parseFloat(t.price24hPcnt)*100;   // already a ratio → ×100
  const hi      = parseFloat(t.highPrice24h);
  const lo      = parseFloat(t.lowPrice24h);
  const vol24   = parseFloat(t.volume24h);
  const prevPx  = price / (1 + parseFloat(t.price24hPcnt));
  const chgAbs  = price - prevPx;
  const up      = chgPct >= 0;

  st('hdr-pair', pair);
  const pe=$('hdr-price');
  pe.textContent = fmt(price);
  pe.className = 'price-big '+(up?'up':'dn');

  const ce=$('hdr-chg');
  ce.textContent = `${up?'+':''}${fmt(chgAbs)} (${up?'+':''}${chgPct.toFixed(2)}%)`;
  ce.className = 'stat-val '+(up?'up':'dn');

  st('hdr-hi', fmt(hi));
  st('hdr-lo', fmt(lo));
  st('hdr-vol', fmtV(vol24)+' '+base);
  document.title = `${fmt(price)} · ${pair} · PRISM`;
}

function updateLegend() {
  const defs=[['ma',[{c:'#f0b90b',l:'MA7'},{c:'#00b0ff',l:'MA25'},{c:'#a855f7',l:'MA99'}]],
              ['bb',[{c:'#0ecb81',l:'BB(20,2)'}]]];
  $('legend').innerHTML=defs.filter(([n])=>activeInds.has(n))
    .flatMap(([,items])=>items)
    .map(({c,l})=>`<div class="leg-tag"><div class="leg-dot" style="background:${c}"></div><span style="color:${c}">${l}</span></div>`)
    .join('');
}

// ═══════════════════════════════════════════
//  WATCHLIST  — real prices via bulk ticker
// ═══════════════════════════════════════════
async function refreshWLPrices() {
  try {
    tickerCache = await bybitAllTickers();
  } catch(e) {
    console.warn('WL ticker fetch failed:', e.message);
  }
  renderList();
  // auto-refresh every 30s
  clearTimeout(wlTimer);
  wlTimer = setTimeout(refreshWLPrices, 30000);
}

function renderList() {
  const qs = ['wl-srch','wl-srch-m'].map(id=>($(id)?.value||'').toUpperCase());
  ['wl-list','wl-list-m'].forEach((id,qi) => {
    const el=$(id); if(!el) return;
    const q=qs[qi];
    const filtered=pairs.filter(p=>!q||p.includes(q));
    if (!filtered.length) {el.innerHTML='<div class="wl-empty">No pairs found.<br>Add one above ↑</div>';return;}

    el.innerHTML = filtered.map(pair => {
      const sym = toSym(pair);
      const t   = tickerCache[sym];
      const price  = t ? parseFloat(t.lastPrice) : null;
      const chgPct = t ? parseFloat(t.price24hPcnt)*100 : null;
      const up = chgPct >= 0;
      const [base,quote] = pair.split('/');
      const priceStr = price!=null ? fmt(price) : '…';
      const chgStr   = chgPct!=null ? `${up?'+':''}${chgPct.toFixed(2)}%` : '…';
      return `<div class="wl-item${pair===curPair?' active':''}" onclick="selectPair('${pair}')">
        <div class="wl-sym">${base}<span class="qt">/${quote}</span></div>
        <div class="wl-right">
          <div class="wl-price" style="color:${price==null?'var(--mut)':up?'var(--up)':'var(--dn)'}">${priceStr}</div>
          <div class="wl-chg ${up?'up':'dn'}">${chgStr}</div>
        </div>
        <button class="wl-del" onclick="delPair('${pair}',event)">×</button>
      </div>`;
    }).join('');
  });
}

function savePairs(){try{localStorage.setItem('prism_pairs',JSON.stringify(pairs));}catch(_){}}

function parsePair(raw) {
  let c = raw.trim().toUpperCase().replace(/[-_\s]+/g,'/');
  if (!c.includes('/')) c += '/USDT';   // default quote
  return c;
}

function addPair(inputId) {
  const el=$(inputId); if(!el) return;
  const val=(el.value||'').trim(); if(!val) return;
  const pair=parsePair(val);
  if(!pairs.includes(pair)){pairs.unshift(pair);savePairs();}
  el.value='';
  selectPair(pair);
}

function delPair(pair,e) {
  e.stopPropagation();
  pairs=pairs.filter(p=>p!==pair); savePairs();
  if(curPair===pair && pairs.length) selectPair(pairs[0]);
  else renderList();
}

async function selectPair(pair) {
  curPair=pair;
  closeMob();
  await loadChart(pair, curTFKey, curTFApi);
}

// ═══════════════════════════════════════════
//  UI CONTROLS
// ═══════════════════════════════════════════
function setTF(key,api) {
  document.querySelectorAll('[id^="tf-"]').forEach(b=>b.classList.remove('active'));
  $('tf-'+key).classList.add('active');
  curTFKey=key; curTFApi=api;
  loadChart(curPair, key, api);
}
function setCT(ct) {
  document.querySelectorAll('[id^="ct-"]').forEach(b=>b.classList.remove('active'));
  $('ct-'+ct).classList.add('active');
  curCT=ct;
  loadChart(curPair, curTFKey, curTFApi);
}
function fitChart(){if(mainChart)mainChart.timeScale().fitContent();if(subChart)subChart.timeScale().fitContent();}

function toggleWL() {
  if(window.innerWidth<=768){openMob();return;}
  wlOpen=!wlOpen;
  $('watchlist').classList.toggle('open',wlOpen);
  $('pairs-btn').classList.toggle('open',wlOpen);
}
function openMob(){$('mob-sheet').classList.add('open');$('mob-bg').classList.add('on');renderList();}
function closeMob(){$('mob-sheet').classList.remove('open');$('mob-bg').classList.remove('on');}

function showCover(on,txt=''){
  const c=$('cover');
  if(on){c.classList.remove('gone');if(txt)st('cover-txt',txt);}
  else c.classList.add('gone');
}
function showErr(msg){$('err-bar').classList.add('show');st('err-msg',`⚠  ${msg}`);}
function hideErr(){$('err-bar').classList.remove('show');}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
window.addEventListener('load', async () => {
  initMain();
  // watchlist open by default on desktop
  if(window.innerWidth>768){wlOpen=true;$('watchlist').classList.add('open');$('pairs-btn').classList.add('open');}
  else $('watchlist').classList.remove('open');

  // Enter key on inputs
  ['wl-inp','wl-inp-m'].forEach(id=>{
    const el=$(id);
    if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')addPair(id);});
  });

  // Initial load
  await loadChart(curPair, curTFKey, curTFApi);
});

window.addEventListener('resize',()=>{
  if(window.innerWidth>768) closeMob();
});
</script>
