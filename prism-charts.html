<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRISM CHARTS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:    #0e1117;
  --bg2:   #151921;
  --bg3:   #1c2230;
  --bg4:   #222a38;
  --bdr:   #252e3e;
  --bdr2:  #2e3a4e;
  --tx:    #e8edf5;
  --tx2:   #a8b3c8;
  --tx3:   #5a6880;
  --up:    #0ecb81;
  --dn:    #f6465d;
  --upbg:  rgba(14,203,129,.08);
  --dnbg:  rgba(246,70,93,.08);
  --gold:  #f0b90b;
  --r1:#ff2d78;--r2:#ff7a00;--r3:#f5d800;--r4:#00e676;--r5:#00b4ff;--r6:#b44fff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{display:flex;flex-direction:column;font-family:'JetBrains Mono',monospace;color:var(--tx);}

@keyframes rbroll{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes fadein{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* ─── rainbow utils ─── */
.rb-line{
  height:2px;flex-shrink:0;
  background:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r1));
  background-size:300%;animation:rbroll 5s linear infinite;
}
.rb-text{
  background:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6));
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:rbroll 5s linear infinite;
}

/* ════════════════════════════════════════
   HEADER — symbol + live price bar
   ════════════════════════════════════════ */
.header{
  display:flex;align-items:stretch;gap:0;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  min-height:58px;
}

/* left: symbol block */
.sym-block{
  display:flex;flex-direction:column;justify-content:center;
  padding:0 20px;gap:3px;flex-shrink:0;
  border-right:1px solid var(--bdr);
  cursor:pointer;transition:background .15s;min-width:150px;
}
.sym-block:hover{background:var(--bg3);}
.sym-name{font-size:17px;font-weight:700;letter-spacing:.3px;line-height:1;}
.sym-sub{font-size:10px;color:var(--tx3);margin-top:1px;letter-spacing:.3px;}

/* center: price + stats */
.price-block{
  display:flex;align-items:center;gap:28px;padding:0 20px;flex:1;overflow-x:auto;
}
.price-block::-webkit-scrollbar{display:none;}

.live-price{
  font-size:26px;font-weight:700;line-height:1;flex-shrink:0;
  transition:color .25s;
}
.live-price.up{color:var(--up);}
.live-price.dn{color:var(--dn);}
.live-price.pend{color:var(--tx3);animation:pulse 1.1s ease infinite;}

.stat-group{display:flex;gap:24px;align-items:center;}
.stat{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.stat-l{font-size:10px;color:var(--tx3);font-weight:400;}
.stat-v{font-size:12px;font-weight:600;white-space:nowrap;}
.stat-v.up{color:var(--up);}
.stat-v.dn{color:var(--dn);}

/* right: pairs button */
.pairs-btn{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:0 16px;flex-shrink:0;cursor:pointer;
  border-left:1px solid var(--bdr);background:none;color:var(--tx2);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:.5px;transition:background .15s,color .15s;
  white-space:nowrap;
}
.pairs-btn:hover{background:var(--bg3);color:var(--tx);}
.pairs-btn .arr{transition:transform .22s;font-size:9px;}
.pairs-btn.open .arr{transform:rotate(180deg);}

/* ════════════════════════════════════════
   TIMEFRAME + CHART-TYPE BAR
   ════════════════════════════════════════ */
.tbar{
  display:flex;align-items:center;gap:0;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  height:36px;padding:0 4px;overflow-x:auto;
}
.tbar::-webkit-scrollbar{display:none;}

.tbar-sep{width:1px;height:16px;background:var(--bdr);margin:0 4px;flex-shrink:0;}
.tlbl{font-size:9px;color:var(--tx3);letter-spacing:1px;padding:0 8px;flex-shrink:0;}

.tbtn{
  background:none;border:none;color:var(--tx3);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  padding:5px 10px;border-radius:4px;cursor:pointer;
  transition:all .12s;flex-shrink:0;white-space:nowrap;
}
.tbtn:hover{background:var(--bg4);color:var(--tx);}
.tbtn.on{background:var(--bg4);color:var(--gold);}

/* vol toggle styled differently */
.tbtn.ind{color:var(--tx3);}
.tbtn.ind.on{color:var(--r5);}

/* ════════════════════════════════════════
   BODY
   ════════════════════════════════════════ */
.body{display:flex;flex:1;overflow:hidden;}

/* ════════════════════════════════════════
   CHART ZONE
   ════════════════════════════════════════ */
.chart-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}

/* OHLC micro bar */
.ohlc-bar{
  display:flex;align-items:center;gap:14px;padding:4px 14px;flex-shrink:0;
  font-size:10px;font-weight:500;overflow-x:auto;background:var(--bg2);
  border-bottom:1px solid var(--bdr);
}
.ohlc-bar::-webkit-scrollbar{display:none;}
.ov{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ov .k{color:var(--tx3);font-size:9px;}

/* chart wrapper */
.chart-wrap{flex:1;position:relative;overflow:hidden;}
#mc{width:100%;height:100%;}

/* loading overlay */
.cover{
  position:absolute;inset:0;background:rgba(14,17,23,.9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:60;transition:opacity .3s;
}
.cover.off{opacity:0;pointer-events:none;}
.spin{width:26px;height:26px;border:2.5px solid var(--bdr2);border-top-color:var(--r5);border-radius:50%;animation:spin .72s linear infinite;}
.cov-txt{font-size:10px;color:var(--tx3);letter-spacing:2px;}

/* legend overlay */
.chart-legend{
  position:absolute;top:10px;left:10px;z-index:10;pointer-events:none;
  display:flex;flex-wrap:wrap;gap:6px;
}
.ltag{
  display:flex;align-items:center;gap:4px;padding:2px 8px;
  background:rgba(14,17,23,.8);border:1px solid var(--bdr);border-radius:3px;
  font-size:9px;
}
.ldot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* oscillator sub-chart */
.sub{height:0;overflow:hidden;transition:height .22s ease;flex-shrink:0;}
.sub.on{height:120px;border-top:1px solid var(--bdr);}
#sc{width:100%;height:100%;}

/* ════════════════════════════════════════
   ERROR BANNER
   ════════════════════════════════════════ */
.err{
  display:none;padding:6px 16px;flex-shrink:0;align-items:center;gap:8px;
  background:rgba(246,70,93,.08);border-bottom:1px solid rgba(246,70,93,.2);
  font-size:10px;color:var(--dn);letter-spacing:.3px;
}
.err.on{display:flex;}

/* ════════════════════════════════════════
   WATCHLIST — RIGHT PANEL
   ════════════════════════════════════════ */
.wl{
  width:0;background:var(--bg2);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .26s cubic-bezier(.4,0,.2,1);
}
.wl.open{width:240px;}

/* watchlist header */
.wl-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 8px;border-bottom:1px solid var(--bdr);flex-shrink:0;gap:8px;
}
.wl-title{font-size:9px;font-weight:700;letter-spacing:2.5px;}

/* add pair row */
.wl-add{display:flex;gap:6px;padding:8px 10px 0;flex-shrink:0;}
.wl-input{
  flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--tx);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  padding:6px 8px;border-radius:5px;outline:none;text-transform:uppercase;min-width:0;
  transition:border-color .2s;
}
.wl-input:focus{border-color:var(--r5);}
.wl-input::placeholder{color:var(--tx3);font-size:10px;text-transform:none;font-weight:400;}
.wl-add-btn{
  background:linear-gradient(135deg,var(--r4),var(--r5));border:none;color:#000;
  font-weight:700;font-family:'JetBrains Mono',monospace;font-size:16px;
  padding:0 11px;border-radius:5px;cursor:pointer;flex-shrink:0;transition:opacity .15s;
}
.wl-add-btn:hover{opacity:.82;}

/* search */
.wl-search{
  margin:7px 10px 0;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);
  font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;
  border-radius:5px;outline:none;transition:border-color .2s;width:calc(100% - 20px);flex-shrink:0;
}
.wl-search:focus{border-color:var(--r5);}
.wl-search::placeholder{color:var(--tx3);}

/* list */
.wl-list{flex:1;overflow-y:auto;margin-top:6px;padding-bottom:4px;}
.wl-list::-webkit-scrollbar{width:3px;}
.wl-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* list items */
.wi{
  display:flex;align-items:center;padding:9px 12px;cursor:pointer;
  transition:background .1s;gap:8px;position:relative;
  border-right:2px solid transparent;
}
.wi:hover{background:var(--bg3);}
.wi.cur{background:var(--bg3);border-right-color:var(--gold);}

.wi-sym{font-size:12px;font-weight:700;flex:1;line-height:1.25;}
.wi-sym .q{color:var(--tx3);font-size:10px;font-weight:400;}
.wi-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.wi-price{font-size:11px;font-weight:700;}
.wi-chg{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;min-width:54px;text-align:right;}
.wi-chg.up{color:var(--up);background:var(--upbg);}
.wi-chg.dn{color:var(--dn);background:var(--dnbg);}
.wi-del{
  background:none;border:none;color:var(--tx3);cursor:pointer;
  font-size:15px;padding:2px 3px;border-radius:3px;
  opacity:0;transition:opacity .15s,color .15s;line-height:1;
}
.wi:hover .wi-del{opacity:1;}
.wi-del:hover{color:var(--dn);}
.wl-empty{padding:28px 14px;text-align:center;color:var(--tx3);font-size:11px;line-height:1.8;}
.wl-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:22px;color:var(--tx3);font-size:10px;}
.wspin{width:13px;height:13px;border:2px solid var(--bdr2);border-top-color:var(--r5);border-radius:50%;animation:spin .7s linear infinite;}

/* ════════════════════════════════════════
   MOBILE BOTTOM SHEET
   ════════════════════════════════════════ */
.mob-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99;opacity:0;pointer-events:none;transition:opacity .28s;}
.mob-bg.on{opacity:1;pointer-events:all;}
.mob-sh{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg2);border-top:1px solid var(--bdr);
  border-radius:16px 16px 0 0;max-height:74vh;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  flex-direction:column;overflow:hidden;
}
.mob-sh.open{transform:translateY(0);}
.sh-pill{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:11px auto 10px;flex-shrink:0;}
.sh-head{padding:0 14px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.sh-body{flex:1;overflow-y:auto;padding-bottom:20px;}

/* ════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════ */
@media(max-width:768px){
  .wl{display:none!important;}
  .mob-bg,.mob-sh{display:flex;}
  .live-price{font-size:20px;}
  .sym-name{font-size:15px;}
  .stat-group{gap:14px;}
  .stat-v{font-size:11px;}
  .price-block{gap:18px;padding:0 12px;}
  .sym-block{padding:0 12px;min-width:120px;}
  .ohlc-bar{gap:10px;}
}
@media(max-width:480px){
  .sym-block{padding:0 10px;min-width:100px;}
  .live-price{font-size:18px;}
  .stat-group{gap:10px;}
}
</style>
</head>
<body>
<div class="rb-line"></div>

<!-- ══════════════════════════════════════
     HEADER
     ══════════════════════════════════════ -->
<div class="header">

  <!-- Symbol (click to open pairs on mobile) -->
  <div class="sym-block" onclick="if(window.innerWidth<=768)openMob()">
    <div class="sym-name rb-text" id="hdrPair">BTC/USDT</div>
    <div class="sym-sub" id="hdrSub">OKX Spot · Crypto</div>
  </div>

  <!-- Live price + stats -->
  <div class="price-block">
    <div class="live-price pend" id="livePrice">···</div>
    <div class="stat-group">
      <div class="stat">
        <span class="stat-l">24h Change</span>
        <span class="stat-v" id="s24chg">—</span>
      </div>
      <div class="stat">
        <span class="stat-l">24h High</span>
        <span class="stat-v up" id="s24hi">—</span>
      </div>
      <div class="stat">
        <span class="stat-l">24h Low</span>
        <span class="stat-v dn" id="s24lo">—</span>
      </div>
      <div class="stat">
        <span class="stat-l">24h Vol</span>
        <span class="stat-v" id="s24vol" style="color:var(--tx2)">—</span>
      </div>
    </div>
  </div>

  <!-- Pairs toggle -->
  <button class="pairs-btn open" id="pairsBtn" onclick="toggleWL()">
    ☰ Pairs <span class="arr">▾</span>
  </button>
</div>

<!-- ══════════════════════════════════════
     TIMEFRAME + TYPE BAR
     ══════════════════════════════════════ -->
<div class="tbar">
  <!-- Timeframes -->
  <button class="tbtn" id="tf-1m"  onclick="setTF('1m','1m')">1m</button>
  <button class="tbtn" id="tf-5m"  onclick="setTF('5m','5m')">5m</button>
  <button class="tbtn" id="tf-15m" onclick="setTF('15m','15m')">15m</button>
  <button class="tbtn" id="tf-1h"  onclick="setTF('1h','1H')">1H</button>
  <button class="tbtn" id="tf-4h"  onclick="setTF('4h','4H')">4H</button>
  <button class="tbtn on" id="tf-1d" onclick="setTF('1d','1D')">1D</button>
  <button class="tbtn" id="tf-1w"  onclick="setTF('1w','1W')">1W</button>
  <div class="tbar-sep"></div>
  <!-- Chart types -->
  <button class="tbtn on" id="ct-candle" onclick="setCT('candle')">Candle</button>
  <button class="tbtn" id="ct-line"      onclick="setCT('line')">Line</button>
  <button class="tbtn" id="ct-area"      onclick="setCT('area')">Area</button>
  <div class="tbar-sep"></div>
  <!-- Indicators -->
  <span class="tlbl">IND</span>
  <button class="tbtn ind" id="ii-ma"   onclick="toggleInd('ma')">MA</button>
  <button class="tbtn ind" id="ii-bb"   onclick="toggleInd('bb')">BB</button>
  <button class="tbtn ind on" id="ii-vol"  onclick="toggleInd('vol')">Vol</button>
  <button class="tbtn ind" id="ii-rsi"  onclick="toggleInd('rsi')">RSI</button>
  <button class="tbtn ind" id="ii-macd" onclick="toggleInd('macd')">MACD</button>
  <div class="tbar-sep"></div>
  <button class="tbtn" onclick="fitChart()" style="color:var(--tx3)">Fit</button>
</div>

<!-- Error banner -->
<div class="err" id="errBar">⚠ &nbsp;<span id="errMsg">Could not load data from OKX.</span></div>

<!-- ══════════════════════════════════════
     BODY
     ══════════════════════════════════════ -->
<div class="body">

  <!-- CHART -->
  <div class="chart-zone">
    <!-- OHLCV crosshair readout -->
    <div class="ohlc-bar">
      <div class="ov"><span class="k">O</span><span id="oo">—</span></div>
      <div class="ov"><span class="k">H</span><span id="oh" style="color:var(--up)">—</span></div>
      <div class="ov"><span class="k">L</span><span id="ol" style="color:var(--dn)">—</span></div>
      <div class="ov"><span class="k">C</span><span id="oc">—</span></div>
      <div class="ov"><span class="k">Vol</span><span id="ov" style="color:var(--tx3)">—</span></div>
    </div>

    <div class="chart-wrap">
      <div id="mc"></div>
      <!-- Loading cover -->
      <div class="cover" id="cover">
        <div class="spin"></div>
        <div class="cov-txt" id="covTxt">FETCHING MARKET DATA</div>
      </div>
      <!-- Indicator legend -->
      <div class="chart-legend" id="lgd"></div>
    </div>

    <!-- Oscillator sub-chart (RSI / MACD) -->
    <div class="sub" id="sub"><div id="sc"></div></div>
  </div>

  <!-- WATCHLIST RIGHT -->
  <div class="wl open" id="wlPanel">
    <div class="wl-top">
      <span class="wl-title rb-text">✦ WATCHLIST</span>
    </div>
    <div class="wl-add">
      <input class="wl-input" id="wlInp" type="text" placeholder="ETH/USDT or SOL…" autocomplete="off" spellcheck="false"/>
      <button class="wl-add-btn" onclick="addPair('wlInp')">+</button>
    </div>
    <input class="wl-search" id="wlSrch" type="text" placeholder="Search…" oninput="renderWL()"/>
    <div class="wl-list" id="wlList">
      <div class="wl-loading"><div class="wspin"></div>Loading prices…</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MOBILE BOTTOM SHEET
     ══════════════════════════════════════ -->
<div class="mob-bg" id="mobBg" onclick="closeMob()"></div>
<div class="mob-sh" id="mobSh">
  <div class="sh-pill"></div>
  <div class="sh-head">
    <div class="wl-title rb-text" style="margin-bottom:9px;display:block;">✦ WATCHLIST</div>
    <div class="wl-add" style="padding:0;margin-bottom:7px;">
      <input class="wl-input" id="wlInpM" type="text" placeholder="ETH/USDT or SOL…" autocomplete="off" spellcheck="false"/>
      <button class="wl-add-btn" onclick="addPair('wlInpM')">+</button>
    </div>
    <input class="wl-search" id="wlSrchM" type="text" placeholder="Search…" oninput="renderWL()" style="margin:0;width:100%;"/>
  </div>
  <div class="sh-body"><div class="wl-list" id="wlListM"></div></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   OKX PUBLIC API — SPOT CRYPTO ONLY
   No API key required. CORS allowed for all public
   market endpoints. Rate: 20 req/2s per endpoint.
   ═══════════════════════════════════════════════ */
const OKX = 'https://www.okx.com/api/v5/market';

// "BTC/USDT" ↔ "BTC-USDT"
const toInst  = p => p.replace('/', '-');

/* Fetch OHLCV candles — returns array newest→oldest, we reverse */
async function fetchCandles(pair, bar, limit = 300) {
  const url = `${OKX}/candles?instId=${toInst(pair)}&bar=${bar}&limit=${limit}`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error(`OKX candles HTTP ${r.status}`);
  const j   = await r.json();
  if (j.code !== '0') throw new Error(`OKX: ${j.msg} (${j.code})`);
  // [ts, open, high, low, close, vol_base, vol_quote, vol_usdt, confirm]
  return j.data.reverse().map(k => ({
    time:  Math.floor(+k[0] / 1000),
    open:  +k[1], high: +k[2], low: +k[3], close: +k[4],
    value: +k[5]
  }));
}

/* Fetch single ticker for header stats */
async function fetchTicker(pair) {
  const url = `${OKX}/ticker?instId=${toInst(pair)}`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error(`OKX ticker HTTP ${r.status}`);
  const j   = await r.json();
  if (j.code !== '0') throw new Error(`OKX ticker: ${j.msg}`);
  return j.data[0]; // { last, open24h, high24h, low24h, vol24h, ... }
}

/* One bulk call for all spot tickers → watchlist prices */
async function fetchAllTickers() {
  const url = `${OKX}/tickers?instType=SPOT`;
  const r   = await fetch(url);
  if (!r.ok) throw new Error(`OKX all-tickers HTTP ${r.status}`);
  const j   = await r.json();
  if (j.code !== '0') throw new Error(`OKX tickers: ${j.msg}`);
  const map = {};
  j.data.forEach(t => { map[t.instId] = t; });
  return map;
}

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
const DEFAULTS = [
  'BTC/USDT','ETH/USDT','SOL/USDT','BNB/USDT','XRP/USDT',
  'DOGE/USDT','ADA/USDT','AVAX/USDT','LINK/USDT','DOT/USDT',
  'TRX/USDT','MATIC/USDT','LTC/USDT','BCH/USDT','UNI/USDT'
];
let pairs    = (() => { try { return JSON.parse(localStorage.getItem('prism_wl')) || [...DEFAULTS]; } catch { return [...DEFAULTS]; } })();
let curPair  = pairs[0] || 'BTC/USDT';
let curTFKey = '1d';
let curBar   = '1D';   // OKX bar param
let curCT    = 'candle';
let mainCh   = null, subCh  = null;
let priSer   = null;
const iMap   = {};            // indicator series refs
const actInd = new Set(['vol']);
let raw      = [];            // current candle data
let subA=null, subB=null, subC=null;
let wlOpen   = true;
let tkCache  = {};            // instId → ticker object
let wlTick   = null;          // refresh timer

/* ═══════════════════════════════════════════════
   FORMATTING
   ═══════════════════════════════════════════════ */
function fmt(v) {
  v = +v;
  if (isNaN(v)) return '—';
  if (v >= 1e6)  return v.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (v >= 1000) return v.toLocaleString('en-US', {maximumFractionDigits: 2});
  if (v >= 1)    return v.toFixed(4);
  if (v >= 0.01) return v.toFixed(5);
  return v.toFixed(8);
}
function fmtV(v) {
  v = +v;
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return v.toFixed(2);
}
const $  = id => document.getElementById(id);
const st = (id, v) => { const e=$(id); if(e) e.textContent = v; };

/* ═══════════════════════════════════════════════
   CHART INITIALISATION
   ═══════════════════════════════════════════════ */
function initMain() {
  const el = $('mc');
  mainCh = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    layout: {
      background: { type: 'solid', color: '#0e1117' },
      textColor: '#5a6880',
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 10,
    },
    grid: { vertLines: { color: '#151921' }, horzLines: { color: '#151921' } },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#252e3e', width: 1, style: 1, labelBackgroundColor: '#1c2230' },
      horzLine: { color: '#252e3e', width: 1, style: 1, labelBackgroundColor: '#1c2230' },
    },
    rightPriceScale: { borderColor: '#1c2230' },
    timeScale: { borderColor: '#1c2230', timeVisible: true, secondsVisible: false },
    handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: false },
    handleScale:  { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
  });

  new ResizeObserver(() => mainCh.applyOptions({ width: el.clientWidth, height: el.clientHeight })).observe(el);

  mainCh.subscribeCrosshairMove(param => {
    if (!param.time || !priSer) return;
    const d = param.seriesData.get(priSer);
    if (!d) return;
    if (curCT === 'candle') {
      st('oo', fmt(d.open)); st('oh', fmt(d.high)); st('ol', fmt(d.low)); st('oc', fmt(d.close));
    } else {
      ['oo','oh','ol'].forEach(i => st(i, '—')); st('oc', fmt(d.value));
    }
    const r = raw.find(x => x.time === param.time);
    st('ov', r ? fmtV(r.value) : '—');
  });
}

function initSub() {
  const el = $('sc');
  subCh = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    layout: { background: { type: 'solid', color: '#0e1117' }, textColor: '#5a6880',
              fontFamily: "'JetBrains Mono', monospace", fontSize: 9 },
    grid: { vertLines: { color: '#111620' }, horzLines: { color: '#111620' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: '#252e3e', width: 1, style: 1, labelBackgroundColor: '#1c2230' },
      horzLine: { color: '#252e3e', width: 1, style: 1, labelBackgroundColor: '#1c2230' } },
    rightPriceScale: { borderColor: '#1c2230' },
    timeScale: { borderColor: '#1c2230', timeVisible: false },
  });
  new ResizeObserver(() => subCh.applyOptions({ width: el.clientWidth, height: el.clientHeight })).observe(el);
}

/* ═══════════════════════════════════════════════
   SERIES HELPERS
   ═══════════════════════════════════════════════ */
function rmSer(s, c = mainCh) { if (s && c) try { c.removeSeries(s); } catch (_) {} }
function rmSubs() { rmSer(subA, subCh); rmSer(subB, subCh); rmSer(subC, subCh); subA = subB = subC = null; }
function mkLn(color, w, style = 0, extra = {}) {
  return mainCh.addLineSeries({ color, lineWidth: w, lineStyle: style,
    priceLineVisible: false, lastValueVisible: false, ...extra });
}

function buildPrimary() {
  const cd = raw.map(({ time, open, high, low, close }) => ({ time, open, high, low, close }));
  const ld = raw.map(({ time, close }) => ({ time, value: close }));

  if (curCT === 'candle') {
    priSer = mainCh.addCandlestickSeries({
      upColor: '#0ecb81', downColor: '#f6465d',
      borderUpColor: '#0ecb81', borderDownColor: '#f6465d',
      wickUpColor: '#0ecb81',   wickDownColor: '#f6465d',
    });
    priSer.setData(cd);
  } else if (curCT === 'line') {
    priSer = mainCh.addLineSeries({ color: '#f0b90b', lineWidth: 2 });
    priSer.setData(ld);
  } else {
    priSer = mainCh.addAreaSeries({
      lineColor: '#f0b90b', topColor: 'rgba(240,185,11,.18)',
      bottomColor: 'rgba(240,185,11,0)', lineWidth: 2 });
    priSer.setData(ld);
  }
}

/* ═══════════════════════════════════════════════
   INDICATOR MATHS
   ═══════════════════════════════════════════════ */
const sma     = (d, p) => d.flatMap((x, i) => i < p-1 ? [] : [{ time: x.time, value: d.slice(i-p+1, i+1).reduce((a, b) => a+b.close, 0) / p }]);
const emaArr  = (d, p) => { const k=2/(p+1); let e=d[0].close; return d.map((x,i)=>{ if(!i)return{time:x.time,value:e}; e=x.close*k+e*(1-k); return{time:x.time,value:e}; }).slice(p-1); };
const emaVals = (arr, p) => { const k=2/(p+1); let e=arr[0]; return arr.map((v,i)=>{ if(!i)return e; e=v*k+e*(1-k); return e; }); };

function bbCalc(d, p, mult) {
  const u=[], m=[], l=[];
  for (let i=p-1; i<d.length; i++) {
    const sl=d.slice(i-p+1,i+1).map(x=>x.close);
    const mn=sl.reduce((a,b)=>a+b,0)/p;
    const sd=Math.sqrt(sl.reduce((a,b)=>a+(b-mn)**2,0)/p);
    u.push({time:d[i].time,value:mn+mult*sd});
    m.push({time:d[i].time,value:mn});
    l.push({time:d[i].time,value:mn-mult*sd});
  }
  return {u,m,l};
}

function rsiCalc(d, p) {
  let ag=0, al=0; const out=[];
  for (let i=1; i<d.length; i++) {
    const c=d[i].close-d[i-1].close, g=c>0?c:0, lo=c<0?-c:0;
    if(i<=p){ag+=g/p;al+=lo/p;}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+lo)/p;}
    if(i>=p) out.push({time:d[i].time, value:100-100/(1+ag/(al||1e-9))});
  }
  return out;
}

function macdCalc(d) {
  const cl=d.map(x=>x.close);
  const fe=emaVals(cl,12), se=emaVals(cl,26);
  const line=d.slice(25).map((x,i)=>({time:x.time,value:fe[25+i]-se[25+i]}));
  const sg=emaVals(line.map(x=>x.value),9);
  return line.slice(8).map((x,i)=>({time:x.time,macd:x.value,sig:sg[8+i],hist:x.value-sg[8+i]}));
}

function applyInd(name) {
  if (name === 'vol') {
    const vs = mainCh.addHistogramSeries({ priceFormat:{type:'volume'}, priceScaleId:'vol' });
    mainCh.priceScale('vol').applyOptions({ scaleMargins:{top:.82,bottom:0} });
    vs.setData(raw.map(d=>({ time:d.time, value:d.value,
      color: d.close>=d.open ? 'rgba(14,203,129,.25)' : 'rgba(246,70,93,.25)' })));
    iMap.vol = vs; return;
  }
  if (name === 'ma') {
    iMap.ma7  = mkLn('#f0b90b', 1);   iMap.ma7.setData(sma(raw,7));
    iMap.ma25 = mkLn('#00b4ff', 1);   iMap.ma25.setData(sma(raw,25));
    iMap.ma99 = mkLn('#b44fff', 1,2); iMap.ma99.setData(sma(raw,99));
  }
  if (name === 'bb') {
    const b = bbCalc(raw,20,2);
    iMap.bbU = mkLn('#0ecb81',1,2); iMap.bbU.setData(b.u);
    iMap.bbM = mkLn('rgba(14,203,129,.3)',1); iMap.bbM.setData(b.m);
    iMap.bbL = mkLn('#0ecb81',1,2); iMap.bbL.setData(b.l);
  }
  if (name === 'rsi') {
    rmSubs(); openSub();
    const r=rsiCalc(raw,14);
    subA = subCh.addLineSeries({color:'#0ecb81',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
    subA.setData(r);
    if (r.length>1) {
      const ob=subCh.addLineSeries({color:'rgba(246,70,93,.35)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
      const os=subCh.addLineSeries({color:'rgba(14,203,129,.35)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
      ob.setData([{time:r[0].time,value:70},{time:r[r.length-1].time,value:70}]);
      os.setData([{time:r[0].time,value:30},{time:r[r.length-1].time,value:30}]);
    }
  }
  if (name === 'macd') {
    rmSubs(); openSub();
    const m=macdCalc(raw);
    subA=subCh.addLineSeries({color:'#00b4ff',lineWidth:2,priceLineVisible:false,lastValueVisible:false});
    subA.setData(m.map(d=>({time:d.time,value:d.macd})));
    subB=subCh.addLineSeries({color:'#f0b90b',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
    subB.setData(m.map(d=>({time:d.time,value:d.sig})));
    subC=subCh.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});
    subC.setData(m.map(d=>({time:d.time,value:d.hist,
      color:d.hist>=0?'rgba(14,203,129,.6)':'rgba(246,70,93,.6)'})));
  }
}

function removeInd(name) {
  const rmk = k => { rmSer(iMap[k]); iMap[k]=null; };
  if(name==='vol') { rmk('vol'); return; }
  if(name==='ma')  { ['ma7','ma25','ma99'].forEach(rmk); return; }
  if(name==='bb')  { ['bbU','bbM','bbL'].forEach(rmk); return; }
  if(name==='rsi'||name==='macd') {
    rmSubs();
    const other=name==='rsi'?'macd':'rsi';
    if(actInd.has(other)) applyInd(other); else closeSub();
  }
}

function openSub()  { $('sub').classList.add('on'); if(!subCh) initSub(); }
function closeSub() { $('sub').classList.remove('on'); }

function toggleInd(name) {
  const el=$('ii-'+name);
  if (actInd.has(name)) {
    actInd.delete(name); el.classList.remove('on'); removeInd(name);
  } else {
    if((name==='rsi'||name==='macd')&&(actInd.has('rsi')||actInd.has('macd'))) {
      ['rsi','macd'].forEach(n=>{ if(actInd.has(n)){actInd.delete(n);$('ii-'+n).classList.remove('on');} });
      rmSubs();
    }
    actInd.add(name); el.classList.add('on'); applyInd(name);
  }
  updateLegend();
}

function updateLegend() {
  const defs=[['ma',[{c:'#f0b90b',l:'MA7'},{c:'#00b4ff',l:'MA25'},{c:'#b44fff',l:'MA99'}]],
              ['bb',[{c:'#0ecb81',l:'BB(20,2)'}]]];
  $('lgd').innerHTML=defs.filter(([n])=>actInd.has(n))
    .flatMap(([,it])=>it)
    .map(({c,l})=>`<div class="ltag"><div class="ldot" style="background:${c}"></div><span style="color:${c}">${l}</span></div>`)
    .join('');
}

/* ═══════════════════════════════════════════════
   MAIN LOAD — real OKX data
   ═══════════════════════════════════════════════ */
async function loadChart(pair, tfKey, bar) {
  showCover(true);
  hideErr();
  try {
    raw = await fetchCandles(pair, bar);

    // Tear down
    if(priSer){try{mainCh.removeSeries(priSer);}catch(_){} priSer=null;}
    Object.keys(iMap).forEach(k=>{ rmSer(iMap[k]); iMap[k]=null; });
    rmSubs();
    if(!actInd.has('rsi')&&!actInd.has('macd')) closeSub();

    buildPrimary();
    for(const n of [...actInd]) applyInd(n);
    updateLegend();
    fitChart();

    // Live ticker → header
    const t = await fetchTicker(pair);
    applyTicker(pair, t);
    showCover(false);

    // Watchlist prices (bulk, 1 call)
    refreshWLPrices();

  } catch(e) {
    showCover(false);
    showErr(e.message || 'Failed to load from OKX');
    console.error(e);
  }
}

function applyTicker(pair, t) {
  const last   = +t.last;
  const open24 = +t.open24h;
  const hi24   = +t.high24h;
  const lo24   = +t.low24h;
  const vol24  = +t.vol24h;
  const chgAbs = last - open24;
  const chgPct = open24 ? (chgAbs/open24)*100 : 0;
  const up     = chgPct >= 0;
  const [base] = pair.split('/');

  st('hdrPair', pair);
  const pe = $('livePrice');
  pe.textContent = fmt(last);
  pe.className = 'live-price '+(up?'up':'dn');

  const ce=$('s24chg');
  ce.textContent=`${up?'+':''}${fmt(chgAbs)} (${up?'+':''}${chgPct.toFixed(2)}%)`;
  ce.className='stat-v '+(up?'up':'dn');

  st('s24hi', fmt(hi24));
  st('s24lo', fmt(lo24));
  st('s24vol', fmtV(vol24)+' '+base);
  document.title=`${fmt(last)} · ${pair} · PRISM`;
}

/* ═══════════════════════════════════════════════
   WATCHLIST PRICES
   ═══════════════════════════════════════════════ */
async function refreshWLPrices() {
  try { tkCache = await fetchAllTickers(); }
  catch(e) { console.warn('WL refresh failed:', e.message); }
  renderWL();
  clearTimeout(wlTick);
  wlTick = setTimeout(refreshWLPrices, 30000);
}

function renderWL() {
  const qs=['wlSrch','wlSrchM'].map(id=>($(id)?.value||'').toUpperCase());
  ['wlList','wlListM'].forEach((lid,qi)=>{
    const el=$(lid); if(!el) return;
    const q=qs[qi];
    const fil=pairs.filter(p=>!q||p.toUpperCase().includes(q));
    if(!fil.length){el.innerHTML='<div class="wl-empty">No pairs found.<br>Add one above ↑</div>';return;}
    el.innerHTML=fil.map(pair=>{
      const tk   = tkCache[toInst(pair)];
      const last = tk ? +tk.last    : null;
      const op24 = tk ? +tk.open24h : null;
      const pct  = (last!=null&&op24) ? (last-op24)/op24*100 : null;
      const up   = pct==null || pct>=0;
      const [base,quote]=pair.split('/');
      const ps   = last!=null ? fmt(last)                           : '…';
      const cs   = pct !=null ? `${up?'+':''}${pct.toFixed(2)}%`   : '…';
      return `<div class="wi${pair===curPair?' cur':''}" onclick="selectPair('${pair}')">
        <div class="wi-sym">${base}<span class="q">/${quote}</span></div>
        <div class="wi-right">
          <div class="wi-price" style="color:${last==null?'var(--tx3)':up?'var(--up)':'var(--dn)'}">${ps}</div>
          <div class="wi-chg ${up?'up':'dn'}">${cs}</div>
        </div>
        <button class="wi-del" onclick="delPair('${pair}',event)">×</button>
      </div>`;
    }).join('');
  });
}

function savePairs(){try{localStorage.setItem('prism_wl',JSON.stringify(pairs));}catch(_){}}

function parsePair(raw){
  let c=raw.trim().toUpperCase().replace(/[-_\s]+/g,'/');
  if(!c.includes('/')) c+='/USDT';
  return c;
}
function addPair(inputId){
  const el=$(inputId); if(!el) return;
  const val=(el.value||'').trim(); if(!val) return;
  const p=parsePair(val);
  if(!pairs.includes(p)){pairs.unshift(p);savePairs();}
  el.value='';
  selectPair(p);
}
function delPair(pair,e){
  e.stopPropagation();
  pairs=pairs.filter(p=>p!==pair);savePairs();
  if(curPair===pair&&pairs.length) selectPair(pairs[0]); else renderWL();
}
function selectPair(pair){
  curPair=pair; closeMob();
  loadChart(pair,curTFKey,curBar);
}

/* ═══════════════════════════════════════════════
   TOOLBAR
   ═══════════════════════════════════════════════ */
function setTF(key,bar){
  document.querySelectorAll('[id^="tf-"]').forEach(b=>b.classList.remove('on'));
  $('tf-'+key).classList.add('on');
  curTFKey=key;curBar=bar;
  loadChart(curPair,key,bar);
}
function setCT(ct){
  document.querySelectorAll('[id^="ct-"]').forEach(b=>b.classList.remove('on'));
  $('ct-'+ct).classList.add('on');
  curCT=ct;
  loadChart(curPair,curTFKey,curBar);
}
function fitChart(){if(mainCh)mainCh.timeScale().fitContent();if(subCh)subCh.timeScale().fitContent();}

/* ═══════════════════════════════════════════════
   PANEL TOGGLE
   ═══════════════════════════════════════════════ */
function toggleWL(){
  if(window.innerWidth<=768){openMob();return;}
  wlOpen=!wlOpen;
  $('wlPanel').classList.toggle('open',wlOpen);
  $('pairsBtn').classList.toggle('open',wlOpen);
}
function openMob() {$('mobSh').classList.add('open');$('mobBg').classList.add('on');renderWL();}
function closeMob(){$('mobSh').classList.remove('open');$('mobBg').classList.remove('on');}

function showCover(on,txt='FETCHING MARKET DATA'){
  const c=$('cover');
  if(on){c.classList.remove('off');st('covTxt',txt);}else c.classList.add('off');
}
function showErr(m){$('errBar').classList.add('on');st('errMsg','⚠  '+m);}
function hideErr() {$('errBar').classList.remove('on');}

/* ═══════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════ */
window.addEventListener('load', async () => {
  initMain();

  if(window.innerWidth>768){
    wlOpen=true;
    $('wlPanel').classList.add('open');
    $('pairsBtn').classList.add('open');
  } else {
    $('wlPanel').classList.remove('open');
  }

  ['wlInp','wlInpM'].forEach(id=>{
    const el=$(id);
    if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')addPair(id);});
  });

  await loadChart(curPair, curTFKey, curBar);
});

window.addEventListener('resize',()=>{if(window.innerWidth>768)closeMob();});
</script>
